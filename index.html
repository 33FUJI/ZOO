<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>33 日本動物園 - 系統整合版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* 區塊一：樣式設定 (美化外觀) */
        body { font-family: sans-serif; background: #f0f4fa; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #dee7f2; }
        .btn-main { background: #003399; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>💙 33 日本動物園</h1>
        <div id="status-msg">系統連線中...</div>
    </div>

    <div class="card" id="pos-area">
        <h3>點餐區</h3>
        <div id="product-list"></div>
    </div>

    <script>
        // 區塊二：設定區 (唯一需要您動手的地方)
        const firebaseConfig = {
            // 請確保填入您原本的正確設定
            apiKey: "填入您的apiKey",
            authDomain: "zoo-62638.firebaseapp.com",
            databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
            projectId: "zoo-62638",
            storageBucket: "zoo-62638.firebasestorage.app",
            messagingSenderId: "33012710753",
            appId: "1:33012710753:web:318636add1f5ac2f7b5920"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 區塊三：功能區 (邏輯處理)
        
        // 1. 讀取商品並顯示
        db.ref("products").on("value", (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('product-list');
            const statusMsg = document.getElementById('status-msg');
            
            if (data) {
                statusMsg.innerText = "✅ 系統已連線";
                // 這裡把資料變成 HTML
                const products = Object.values(data);
                listDiv.innerHTML = products.map(p => `
                    <div style="margin: 10px 0; border-bottom: 1px solid #eee;">
                        <strong>${p.name}</strong> - $${p.price}
                    </div>
                `).join('');
            } else {
                statusMsg.innerText = "⚠️ 目前沒有商品資料";
            }
        });

    </script>
</body>
</html>
