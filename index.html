<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --matcha: #606C38; --rice: #FEF9EF; --caramel: #BC6C25; --wood: #283618; --gray: #F4F1EA; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }
        .hall { position: fixed; inset: 0; background: var(--rice); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .grid-hall { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .card-hall { background: #FFF; padding: 25px 10px; border-radius: 15px; border: 1px solid #EAE2D1; text-align: center; cursor: pointer; box-shadow: 0 4px 0 #EAE2D1; font-weight: bold; color: var(--matcha); font-size: 16px; }
        .app-container { display: none; flex: 1; overflow: hidden; flex-direction: row; }
        .list-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--gray); -webkit-overflow-scrolling: touch; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .prod-card { background: #FFF; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-height: 280px; }
        .prod-name { font-size: 16px; font-weight: bold; min-height: 45px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; }
        .prod-price { color: var(--caramel); font-size: 18px; margin: 8px 0; font-weight: bold; text-align: center; }
        .spec-area { min-height: 60px; margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 4px; }
        .qty-area { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #DDD; background: #FFF; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .cart-area { width: 360px; background: #FFF; border-left: 1px solid #DDD; display: flex; flex-direction: column; }
        .cart-bottom { padding: 15px; border-top: 1px solid #EEE; background: #FFF; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .cart-area { width: 100%; flex: 1.5; border-left: none; } .prod-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; } }
        .btn-add { background: var(--matcha); color: #FFF; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .input-std { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #DDD; border-radius: 10px; font-size: 15px; }
        #admin-panel { position: fixed; inset: 0; background: #F8F9FA; z-index: 4000; display: none; flex-direction: column; }
        .admin-header { background: var(--wood); color: #FFF; padding: 15px; display: flex; justify-content: space-between; }
        .admin-order-card { background: #FFF; border: 1px solid #EEE; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="document.getElementById('search-modal').style.display='flex'" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area"><div id="prod-list" class="prod-grid"></div></div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #EEE;">🛒 購物清單</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="cart-bottom">
            <p style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">總計: <span id="cart-total">0</span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button id="submit-order-btn" class="btn-add" style="width:100%; padding:16px; font-size:18px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <h2 style="text-align:center; color:var(--matcha);">個人訂單查詢</h2>
        <input id="search-nick" class="input-std" placeholder="輸入您的 LINE 暱稱">
        <div id="search-results-area" style="max-height:400px; overflow-y:auto; margin-bottom:15px;"></div>
        <button class="btn-add" style="width:100%; padding:15px;" onclick="performSearch()">開始查詢</button>
        <button onclick="closeSearch()" style="width:100%; margin-top:10px; border:none; background:none; color:#666;">關閉視窗</button>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header"><b>33 園長工作台</b><button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button></div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], orders = {}, cart = [], curS = {}, curQty = {}, currentEvent = "";
    let searchListener = null;

    db.ref('products').on('value', snap => { products = snap.val() || []; renderHall(); if(currentEvent) openShop(currentEvent); });
    db.ref('orders').on('value', snap => { orders = snap.val() || {}; });

    function renderHall() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('hall-grid').innerHTML = evts.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }

    function openShop(e) {
        currentEvent = e; document.getElementById('hall-screen').style.display='none'; document.getElementById('main-app').style.display='flex';
        const list = products.filter(p => p.e === e);
        document.getElementById('prod-list').innerHTML = list.map(p => {
            const rid = products.indexOf(p);
            return `<div class="prod-card">
                <div class="prod-name">${p.n}</div>
                <div class="prod-price">$${p.p}</div>
                <div class="spec-area">${p.s ? p.s.split(',').map(v=>`<button onclick="selSpec(${rid},'${v}',this)" style="padding:4px; margin:2px;">${v}</button>`).join('') : ''}</div>
                <button class="btn-add" onclick="addToCart(${rid})">加入購物車</button>
            </div>`;
        }).join('');
    }

    function backToHall() { currentEvent = ""; document.getElementById('main-app').style.display='none'; document.getElementById('hall-screen').style.display='flex'; }
    function selSpec(rid, v, btn) { 
        curS[rid] = v; 
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(b => b.style.background = "#FFF");
        btn.style.background = "#EAE2D1";
    }

    function addToCart(rid) {
        const p = products[rid]; if(p.s && !curS[rid]) return alert("請選規格");
        cart.push({...p, sel: curS[rid] || "一般", pid: rid, t: Date.now()});
        renderCart();
    }

    function renderCart() {
        document.getElementById('cart-items').innerHTML = cart.map((it, idx) => `<div>${it.n} (${it.sel}) <span onclick="cart.splice(${idx},1);renderCart()">✕</span></div>`).join('');
        document.getElementById('cart-total').innerText = cart.reduce((a,b)=>a+b.p,0);
    }

    function submitOrder() {
        const n = document.getElementById('nick').value.trim();
        if(!n || cart.length===0) return alert("請輸入暱稱與商品");
        db.ref('orders').push({ nick: n, items: cart, total: cart.reduce((a,b)=>a+b.p,0), time: Date.now(), isPaid: false })
        .then(() => {
            // 下單成功，將暱稱授權存入這台手機
            let auth = JSON.parse(localStorage.getItem('zoo_auth') || "[]");
            if(!auth.includes(n.toLowerCase())) auth.push(n.toLowerCase());
            localStorage.setItem('zoo_auth', JSON.stringify(auth));
            alert("訂單已提交！"); cart = []; location.reload();
        });
    }

    // --- 關鍵查詢邏輯 ---
    function performSearch() {
        const n = document.getElementById('search-nick').value.trim().toLowerCase();
        const resArea = document.getElementById('search-results-area');
        if(!n) return;

        // 隱私檢查
        const auth = JSON.parse(localStorage.getItem('zoo_auth') || "[]");
        if (!auth.includes(n)) {
            resArea.innerHTML = `<p style="text-align:center; color:#999; padding:20px; font-size:13px;">🔒 隱私保護：僅限本人手機查詢。<br>若換裝置，請於新裝置下單一次即可解鎖。</p>`;
            return;
        }

        if(searchListener) db.ref('orders').off('value', searchListener);
        searchListener = db.ref('orders').on('value', snap => {
            const all = snap.val() || {};
            // 計算候補排名邏輯
            let pool = {};
            Object.values(all).forEach(o => { (o.items||[]).forEach(it => { let sk = `${it.pid}_${it.sel}`; if(!pool[sk]) pool[sk] = []; pool[sk].push({...it, t: it.t || o.time}); }); });
            for(let k in pool) pool[k].sort((a,b) => a.t - b.t);

            let my = Object.values(all).filter(o => o.nick.toLowerCase() === n);
            resArea.innerHTML = my.length ? my.reverse().map(o => {
                let itemsText = (o.items || []).map(it => {
                    let sk = `${it.pid}_${it.sel}`;
                    let limit = (products[it.pid] || {}).limit || 999;
                    let rank = pool[sk].findIndex(p => p.t === it.t) + 1;
                    let isWin = it.fWin || (rank > 0 && rank <= limit);
                    return `<div>• ${it.n}(${it.sel}) ${isWin ? '<b style="color:green;">[正]</b>' : '<b style="color:orange;">[補'+(rank-limit)+']</b>'}${it.ship?'🚚':''}</div>`;
                }).join('');
                return `<div class="admin-order-card" style="font-size:14px;">
                    <div style="font-size:11px; color:#AAA;">${new Date(o.time).toLocaleString()}</div>
                    ${itemsText}
                    <div style="text-align:right; border-top:1px dashed #EEE; margin-top:5px; padding-top:5px;">
                        總額: $${o.total} | ${o.isPaid ? '<span style="color:green;">已結清</span>' : '<span style="color:red;">未清</span>'}
                    </div>
                </div>`;
            }).join('') : '無訂單';
        });
    }

    function closeSearch() { if(searchListener) db.ref('orders').off('value', searchListener); document.getElementById('search-modal').style.display='none'; }
    function adminLogin() { if(prompt("密碼")==="1239") document.getElementById('admin-panel').style.display='flex'; }
</script>
</body>
</html>
