<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>33日本動物園 系統管理台</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<table id="admin-events-table"></table>
<div id="admin-orders-list"></div>
<div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
    <div style="background:#fff; padding:20px; width:80%;">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <button id="modal-save">確認儲存更新</button>
        <button onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let products = [], orders = {}, currentFilterUser = 'all', currentMoneyFilter = 'all';

    database.ref('/').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            products = data.products || [];
            orders = data.orders || {};
            renderAdminEvents();
            renderAdminOrders();
        }
    });

    /* ==================== 💎 核心：精密成本利潤計算與場次維護 ==================== */
    function renderAdminEvents() {
        const evts = [...new Set(products.map(p => p ? p.e : ''))].filter(e => e);
        const tbody = document.getElementById('admin-events-table');
        if(!tbody) return;
        if(evts.length === 0) { tbody.innerHTML = `<tr><td colspan="4">目前沒有建立任何場次。</td></tr>`; return; }
        tbody.innerHTML = evts.map(e => {
            const count = products.filter(p => p && p.e === e).length;
            return `<tr><td>${e}</td><td>進行中</td><td>${count} 項商品</td><td><button onclick="renderAdminProdsView('${e}')">查看</button><button onclick="deleteEntireEvent('${e}')">刪除</button></td></tr>`;
        }).join('');
    }

    function renderAdminProdsView(evtName) {
        const tbody = document.getElementById('admin-events-table');
        let html = `<tr><td colspan="4"><b>[${evtName}] 明細：</b><br>`;
        products.forEach((p, i) => {
            if(p && p.e === evtName) {
                const costTWD = Math.round((p.cp || 0) * (p.rate || 0.22));
                html += `<div>${p.n} - 利潤: NT$ ${(p.p || 0) - costTWD} <button onclick="openProductEdit(${i})">修改</button></div>`;
            }
        });
        html += `<button onclick="renderAdminEvents()">返回</button></td></tr>`;
        tbody.innerHTML = html;
    }

    /* ==================== 📋 訂單管理與個別商品編輯/刪除功能 ==================== */
    function renderAdminOrders() {
        const main = document.getElementById('admin-orders-list');
        if (!main) return;
        let listHtml = '';
        Object.entries(orders).forEach(([k, o]) => {
            if(!o) return;
            listHtml += `<div><b>${o.nick}</b> - $${o.total || 0} <button onclick="if(confirm('確定刪除？'))firebase.database().ref('orders/${k}').remove();">刪除整單</button></div>`;
        });
        main.innerHTML = listHtml;
    }

    function openAddEventModal() {
        document.getElementById('modal-title').innerText = "建立新場次";
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function openProductEdit(index) {
        document.getElementById('modal-title').innerText = "修改商品";
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    function deleteEntireEvent(e) { if(confirm('確定刪除？')) { products = products.filter(p => p.e !== e); database.ref('products').set(products); } }

</script>
</body>
</html>
