<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園 - 救援版</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --matcha: #606C38; --rice: #FEF9EF; --caramel: #BC6C25; --wood: #283618; --gray: #F4F1EA; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }
        .hall { position: fixed; inset: 0; background: var(--rice); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .grid-hall { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .card-hall { background: #FFF; padding: 25px 10px; border-radius: 15px; border: 1px solid #EAE2D1; text-align: center; cursor: pointer; box-shadow: 0 4px 0 #EAE2D1; font-weight: bold; color: var(--matcha); font-size: 16px; }
        .app-container { display: none; flex: 1; overflow: hidden; flex-direction: row; }
        .list-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--gray); }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .prod-card { background: #FFF; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-height: 280px; }
        .prod-name { font-size: 16px; font-weight: bold; min-height: 45px; text-align: center; }
        .prod-price { color: var(--caramel); font-size: 18px; margin: 8px 0; font-weight: bold; text-align: center; }
        .spec-area { min-height: 60px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        .qty-area { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #DDD; background: #FFF; cursor: pointer; }
        .cart-area { width: 360px; background: #FFF; border-left: 1px solid #DDD; display: flex; flex-direction: column; }
        .cart-bottom { padding: 15px; border-top: 1px solid #EEE; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .btn-add { background: var(--matcha); color: #FFF; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #admin-panel { position: fixed; inset: 0; background: #F8F9FA; z-index: 4000; display: none; flex-direction: column; }
        .admin-header { background: var(--wood); color: #FFF; padding: 15px; display: flex; justify-content: space-between; }
        .admin-nav { padding: 10px; background: #EEE; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #DDD; }
        .admin-order-card { background: #FFF; border: 1px solid #EEE; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #DDD; }
        .admin-order-card.has-data { border-left-color: var(--matcha); }
        .admin-order-card.is-error { border-left-color: #E63946; background: #FFF5F5; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .input-std { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #DDD; border-radius: 10px; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .cart-area { width: 100%; flex: 1.5; } .prod-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="document.getElementById('search-modal').style.display='flex'" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area"><div id="prod-list" class="prod-grid"></div></div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold;">🛒 購物清單</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="cart-bottom">
            <p>總計: <span style="color:var(--caramel); font-weight:bold;">$ <span id="cart-total">0</span></span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button class="btn-add" style="width:100%; padding:16px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header">
        <b>33 園長工作台 (救援模式)</b>
        <select id="admin-event-filter" onchange="renderAdminOrders()"><option value="ALL">🔍 顯示所有訂單 (含救援資料)</option></select>
        <button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button>
    </div>
    <div class="admin-nav">
        <button class="btn-add" onclick="renderAdminOrders()">訂單管理</button>
        <button class="btn-add" style="background:#BC6C25;" onclick="unlockAllOrders()">🔓 一鍵全開</button>
        <button class="btn-add" style="background:#E07A5F;" onclick="openPackAssistant()">📦 即時配貨助手</button>
        <button class="btn-add" style="background:#888;" onclick="renderAdminProds()">商品維護</button>
    </div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px;"></div>
</div>

<div id="edit-modal" class="modal"><div class="modal-box"><h3 id="modal-title">編輯</h3><div id="modal-body"></div><div style="display:flex; gap:10px; margin-top:20px;"><button class="btn-add" id="modal-save" style="flex:1;">儲存</button><button class="btn-add" style="flex:1; background:#999;" onclick="document.getElementById('edit-modal').style.display='none'">取消</button></div></div></div>
<div id="search-modal" class="modal"><div class="modal-box"><h2>個人查詢</h2><input id="search-nick" class="input-std" placeholder="您的 LINE 暱稱" oninput="performSearch()"><div id="search-results-area"></div><button onclick="document.getElementById('search-modal').style.display='none'" style="width:100%; margin-top:10px; border:none; background:none;">關閉</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], orders = {}, cart = [], curS = {}, curQty = {}, currentEvent = "";

    db.ref('products').on('value', snap => { products = snap.val() || []; renderHall(); updateAdminFilter(); });
    db.ref('orders').on('value', snap => { 
        orders = snap.val() || {}; 
        if(document.getElementById('admin-panel').style.display==='flex') renderAdminOrders(); 
    });

    function renderHall() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('hall-grid').innerHTML = evts.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }
    function updateAdminFilter() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('admin-event-filter').innerHTML = '<option value="ALL">🔍 顯示所有訂單 (含救援資料)</option>' + evts.map(e => `<option value="${e}">${e}</option>`).join('');
    }

    function openShop(e) {
        currentEvent = e; document.getElementById('hall-screen').style.display='none'; document.getElementById('main-app').style.display='flex';
        const list = products.filter(p => p.e === e);
        document.getElementById('prod-list').innerHTML = list.map(p => {
            const rid = products.indexOf(p); if(!curQty[rid]) curQty[rid] = 1;
            const specArr = p.s ? p.s.split(/,|，/) : [];
            const specs = specArr.map(v => v.trim()).filter(v => v).map(v=>`<button id="s-${rid}-${v}" onclick="selSpec(${rid},'${v}')" style="border:1px solid #DDD; margin:2px; font-size:11px; background:#FFF; border-radius:4px; padding:4px 8px;">${v}</button>`).join('');
            return `<div class="prod-card"><div class="prod-name">${p.n}</div><div class="prod-price">$${p.p}</div><div class="spec-area">${specs}</div><div class="qty-area"><button class="btn-qty" onclick="updateQty(${rid},-1)">-</button><span id="qty-val-${rid}">${curQty[rid]}</span><button class="btn-qty" onclick="updateQty(${rid},1)">+</button></div><button class="btn-add" onclick="addToCart(${rid})">加入購物車</button></div>`;
        }).join('');
    }
    function selSpec(rid, v) { curS[rid] = v; document.querySelectorAll(`[id^="s-${rid}-"]`).forEach(b => b.style.background = '#FFF'); document.getElementById(`s-${rid}-${v}`).style.background = '#EAE2D1'; }
    function updateQty(rid, d) { let v = (curQty[rid] || 1) + d; if(v < 1) v = 1; curQty[rid] = v; document.getElementById(`qty-val-${rid}`).innerText = v; }
    function backToHall() { document.getElementById('main-app').style.display='none'; document.getElementById('hall-screen').style.display='flex'; }

    function addToCart(rid) {
        const p = products[rid], sA = p.s ? p.s.split(/,|，/).filter(x=>x.trim()) : [];
        if(sA.length > 0 && !curS[rid]) return alert("請選規格");
        const itemWithId = { ...p, sel: curS[rid]||"一般", pid: rid };
        for(let i=0; i<curQty[rid]; i++) cart.push({ ...itemWithId });
        renderCart();
    }
    function renderCart() {
        let summ = {}; cart.forEach(it => { let k = `${it.pid}_${it.sel}`; summ[k] = (summ[k]||0)+1; });
        document.getElementById('cart-items').innerHTML = Object.keys(summ).map(k => {
            const [pid, sel] = k.split('_'); return `<div style="padding:8px; border-bottom:1px solid #EEE; display:flex; justify-content:space-between;"><span>${products[pid].n}(${sel}) x ${summ[k]}</span><span onclick="cart=cart.filter(x=>!(x.pid==${pid}&&x.sel=='${sel}'));renderCart();">✕</span></div>`
        }).join('');
        document.getElementById('cart-total').innerText = cart.reduce((a,b)=>a+b.p,0);
    }
    function submitOrder() {
        const n = document.getElementById('nick').value.trim(); if(!n || cart.length===0) return alert("請填寫暱稱及選購商品");
        db.ref('orders').push({ nick: n, items: cart, total: cart.reduce((a,b)=>a+b.p,0), time: Date.now(), isUnlocked: false }).then(() => { alert("提交成功"); location.reload(); });
    }

    // --- 核心：強力救援讀取邏輯 ---
    function renderAdminOrders() {
        const main = document.getElementById('admin-main'), filterEvt = document.getElementById('admin-event-filter').value;
        main.innerHTML = `<button class="btn-add" style="width:100%; margin-bottom:10px;" onclick="mergeSelected()">🔗 選取併單</button>`;
        
        Object.entries(orders).sort((a,b)=>a[1].time-b[1].time).forEach(([k, o]) => {
            if (!o || !o.nick) return; // 只要有暱稱就嘗試讀取

            // 強制格式轉換，解決亂碼或層級問題
            let itemList = [];
            let isError = false;
            try {
                if (o.items) {
                    itemList = Array.isArray(o.items) ? o.items : Object.values(o.items);
                } else {
                    isError = true;
                }
            } catch(e) {
                isError = true;
            }

            // 場次過濾
            if (filterEvt !== "ALL" && !itemList.some(it => it && it.e === filterEvt)) return;

            const itemsHtml = isError ? `<div style="color:red; font-size:12px;">⚠️ 此訂單內容損壞，建議手動補單或刪除。</div>` : 
                itemList.map((it, idx) => `
                <div style="font-size:13px; padding:4px 0; border-bottom:1px dotted #EEE; display:flex; justify-content:space-between;">
                    <span style="${it && it.isShipped?'color:#AAA;text-decoration:line-through;':''}">[${(it&&it.e)||'未分類'}] ${(it&&it.n)||'無名稱'}(${(it&&it.sel)||'-'}) $${(it&&it.p)||0}</span>
                    <button onclick="deleteSingleItem('${k}', ${idx})" style="color:red; background:none; border:none; font-size:10px;">✕</button>
                </div>`).join('');
            
            main.innerHTML += `<div class="admin-order-card ${isError?'is-error':'has-data'}">
                <div style="display:flex; justify-content:space-between;">
                    <b><input type="checkbox" class="merge-check" value="${k}" data-nick="${o.nick}"> ${o.nick}</b>
                    <span style="font-size:10px; color:#999;">${new Date(o.time).toLocaleDateString()}</span>
                    <button onclick="if(confirm('刪除整筆？'))db.ref('orders/${k}').remove()" style="color:red; border:none; background:none;">🗑️</button>
                </div>
                ${itemsHtml}
                <div style="text-align:right; font-weight:bold; margin-top:5px; color:var(--caramel);">總計：$${o.total||0}</div>
            </div>`;
        });
    }

    // --- 即時連動配貨助手 (同樣具備救援邏輯) ---
    function openPackAssistant() {
        document.getElementById('modal-title').innerText = "📦 即時配貨助手 (連動更新)";
        let html = `<div style="color:red; font-size:12px; margin-bottom:10px;">點擊勾選框即「即時更新」出貨狀態。</div><div style="max-height:400px; overflow-y:auto;">`;
        
        Object.entries(orders).forEach(([ok, o]) => {
            if(!o || !o.nick) return;
            let itemList = [];
            try { itemList = Array.isArray(o.items) ? o.items : Object.values(o.items || {}); } catch(e){}
            
            html += `<div style="background:#FFF; margin-bottom:10px; padding:10px; border-radius:8px; border:1px solid #DDD;">
                        <div style="font-weight:bold; border-bottom:1px solid #EEE; padding-bottom:5px;">👤 ${o.nick}</div>`;
            itemList.forEach((it, idx) => {
                if(!it) return;
                html += `<div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #F9F9F9;">
                            <input type="checkbox" style="transform:scale(1.3);" ${it.isShipped?'checked':''} onchange="toggleInstantShip('${ok}', ${idx}, this.checked)">
                            <div style="flex:1; font-size:13px; ${it.isShipped?'color:#AAA;':''}">[${it.e||'未分類'}] ${it.n}(${it.sel})</div>
                        </div>`;
            });
            html += `</div>`;
        });
        html += `</div>`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').innerText = "完成關閉";
        document.getElementById('modal-save').onclick = () => document.getElementById('edit-modal').style.display = 'none';
    }

    function toggleInstantShip(orderKey, itemIdx, status) {
        db.ref(`orders/${orderKey}/items/${itemIdx}`).update({ isShipped: status });
    }

    function deleteSingleItem(orderKey, itemIdx) {
        if(!confirm('刪除此項商品？')) return;
        let o = orders[orderKey];
        let itemList = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
        itemList.splice(itemIdx, 1);
        if(itemList.length === 0) db.ref(`orders/${orderKey}`).remove();
        else db.ref(`orders/${orderKey}`).update({ items: itemList, total: itemList.reduce((a,b)=>a+(b.p||0),0) });
    }

    function mergeSelected() {
        const checks = Array.from(document.querySelectorAll('.merge-check:checked')); if(checks.length<2) return alert("請選取兩筆以上");
        const keys = checks.map(el => el.value); let items = [], total = 0;
        keys.forEach(k => { 
            let o = orders[k];
            let itemList = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            items = items.concat(itemList); total += (o.total||0); 
        });
        db.ref('orders').push({ nick: checks[0].getAttribute('data-nick'), items, total, time: Date.now(), isUnlocked: true }).then(() => { 
            keys.forEach(k => db.ref(`orders/${k}`).remove()); alert("併單完成"); 
        });
    }

    function unlockAllOrders() { Object.keys(orders).forEach(k => db.ref(`orders/${k}`).update({isUnlocked:true})); alert("全開完成"); }

    function renderAdminProds() {
        const main = document.getElementById('admin-main');
        main.innerHTML = `<button class="btn-add" style="width:100%; margin-bottom:15px;" onclick="openEdit(-1)">＋ 新增商品</button>` + 
            products.map((p, i) => `<div class="admin-order-card" style="display:flex; justify-content:space-between;"><div><b>[${p.e}] ${p.n}</b><br>$${p.p}</div><button class="btn-add" style="background:var(--caramel);" onclick="openEdit(${i})">編輯</button></div>`).join('');
    }

    function openEdit(index) {
        const isNew = index === -1; const p = isNew ? {e:'', n:'', p:0, s:''} : products[index];
        document.getElementById('modal-title').innerText = isNew ? "新增商品" : "編輯商品";
        document.getElementById('modal-body').innerHTML = `場次：<input id="inp-e" class="input-std" value="${p.e}">名稱：<input id="inp-n" class="input-std" value="${p.n}">售價：<input id="inp-p" type="number" class="input-std" value="${p.p}">規格：<input id="inp-s" class="input-std" value="${p.s}" placeholder="紅,藍">`;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const vE = document.getElementById('inp-e').value, vN = document.getElementById('inp-n').value, vP = parseInt(document.getElementById('inp-p').value), vS = document.getElementById('inp-s').value;
            let nP = [...products]; if(isNew) nP.push({e:vE, n:vN, p:vP, s:vS}); else nP[index] = {e:vE, n:vN, p:vP, s:vS};
            db.ref('products').set(nP).then(()=> { alert("成功"); document.getElementById('edit-modal').style.display='none'; });
        };
    }

    function performSearch() {
        const n = document.getElementById('search-nick').value.trim();
        const res = Object.values(orders).filter(o => o.nick === n && o.isUnlocked);
        document.getElementById('search-results-area').innerHTML = res.map(o => {
            let itemList = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            return `<div style="background:#FFF;padding:12px;margin-top:10px;border-radius:12px;border-left:4px solid var(--matcha);">` +
            itemList.map(it => `<div style="display:flex; justify-content:space-between; ${it && it.isShipped?'color:#AAA;text-decoration:line-through;':''}"><span>[${(it&&it.e)||''}] ${(it&&it.n)||''}</span><b>$${(it&&it.p)||0}</b></div>`).join('') +
            `<div style="text-align:right; font-weight:bold; margin-top:8px;">總計：$${o.total||0}</div></div>`;
        }).join('');
    }
    function adminLogin() { if(prompt("管理密碼")==="1239") document.getElementById('admin-panel').style.display='flex'; }
</script>
</body>
</html>
