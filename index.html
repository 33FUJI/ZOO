<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --matcha: #606C38;
            --rice: #FEF9EF;
            --caramel: #BC6C25;
            --wood: #283618;
            --gray: #F4F1EA;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Sans TC', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--gray);
            overflow: hidden;
            color: var(--wood);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* 首頁目錄 */
        .hall {
            position: fixed;
            inset: 0;
            background: var(--rice);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .grid-hall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .card-hall {
            background: #FFF;
            padding: 25px 10px;
            border-radius: 15px;
            border: 1px solid #EAE2D1;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #EAE2D1;
            font-weight: bold;
            color: var(--matcha);
            font-size: 16px;
        }

        /* 商店主應用區 */
        .app-container {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        .list-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: var(--gray);
        }

        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .prod-card {
            background: #FFF;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 280px;
        }

        .cart-area {
            width: 360px;
            background: #FFF;
            border-left: 1px solid #DDD;
            display: flex;
            flex-direction: column;
        }

        .cart-bottom {
            padding: 15px;
            border-top: 1px solid #EEE;
            background: #FFF;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .btn-add {
            background: var(--matcha);
            color: #FFF;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 管理者面板 */
        #admin-panel {
            position: fixed;
            inset: 0;
            background: #F8F9FA;
            z-index: 4000;
            display: none;
            flex-direction: column;
        }

        .admin-header {
            background: var(--wood);
            color: #FFF;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-nav {
            padding: 10px;
            background: #EEE;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #DDD;
        }

        .admin-order-card {
            background: #FFF;
            border: 1px solid #EEE;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* 彈窗樣式 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 15px;
        }

        .modal-box {
            background: var(--rice);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .input-std {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #DDD;
            border-radius: 10px;
        }

        .pack-item {
            cursor: pointer;
            padding: 12px;
            border: 1px solid #EEE;
            margin: 6px 0;
            border-radius: 10px;
            background: #FFF;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pack-item.active {
            border-color: var(--caramel);
            background: #FEF9EF;
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .cart-area { width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="document.getElementById('search-modal').style.display='flex'" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area"><div id="prod-list" class="prod-grid"></div></div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold; background:#FDFDFD; border-bottom:1px solid #EEE;">🛒 購物清單</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="cart-bottom">
            <p style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin:5px 0;">總計: <span style="color:var(--caramel);">$ <span id="cart-total">0</span></span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button class="btn-add" style="width:100%; padding:16px; font-size:18px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999; font-size:13px;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header">
        <b>33 園長工作台</b>
        <button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button>
    </div>
    <div class="admin-nav">
        <button class="btn-add" onclick="renderAdminOrders()">訂單管理</button>
        <button class="btn-add" style="background:#BC6C25;" onclick="unlockAllOrders()">🔓 一鍵全開</button>
        <button class="btn-add" style="background:#888;" onclick="renderAdminProds()">商品維護</button>
        <button class="btn-add" style="background:#E07A5F;" onclick="openPackAssistant()">📦 配貨助手</button>
    </div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px; background:var(--gray);"></div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title">標題</h3>
        <div id="modal-body"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-add" id="modal-save" style="flex:1;">儲存</button>
            <button class="btn-add" style="flex:1; background:#999;" onclick="document.getElementById('edit-modal').style.display='none'">取消</button>
        </div>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <h2 style="text-align:center;">個人訂單查詢</h2>
        <input id="search-nick" class="input-std" placeholder="您的 LINE 暱稱">
        <div id="search-results-area"></div>
        <button class="btn-add" style="width:100%; padding:15px;" onclick="performSearch()">開始查詢</button>
        <button onclick="document.getElementById('search-modal').style.display='none'" style="background:none; border:none; color:#666; width:100%; margin-top:10px;">關閉</button>
    </div>
</div>

<script>
    // 1. Firebase 初始化
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [];
    let orders = {};
    let cart = [];
    let curQty = {};
    let tempPackStatus = {};

    // 2. 數據監聽
    db.ref('products').on('value', snap => {
        products = snap.val() || [];
        renderHall();
    });

    db.ref('orders').on('value', snap => {
        orders = snap.val() || {};
        // 如果管理面板開著，根據當前狀態刷新
        if (document.getElementById('admin-panel').style.display === 'flex') {
            const currentTab = document.getElementById('modal-title').innerText;
            if (currentTab !== "📦 配貨助手") {
                renderAdminOrders();
            }
        }
    });

    // 3. 前台功能
    function renderHall() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('hall-grid').innerHTML = evts.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }

    function openShop(e) {
        document.getElementById('hall-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        const list = products.filter(p => p.e === e);
        document.getElementById('prod-list').innerHTML = list.map(p => {
            const rid = products.indexOf(p);
            if (!curQty[rid]) curQty[rid] = 1;
            return `<div class="prod-card">
                <div class="prod-name">${p.n}</div>
                <div class="prod-price">$${p.p}</div>
                <div class="qty-area" style="display:flex; justify-content:center; align-items:center; gap:10px; margin:10px 0;">
                    <button class="btn-add" style="padding:5px 12px; background:#DDD; color:#333;" onclick="updateQty(${rid},-1)">-</button>
                    <span id="qty-val-${rid}">${curQty[rid]}</span>
                    <button class="btn-add" style="padding:5px 12px; background:#DDD; color:#333;" onclick="updateQty(${rid},1)">+</button>
                </div>
                <button class="btn-add" onclick="addToCart(${rid})">加入購物車</button>
            </div>`;
        }).join('');
    }

    function updateQty(rid, d) {
        let v = (curQty[rid] || 1) + d;
        if (v < 1) v = 1;
        curQty[rid] = v;
        document.getElementById(`qty-val-${rid}`).innerText = v;
    }

    function backToHall() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('hall-screen').style.display = 'flex';
    }

    function addToCart(rid) {
        const p = products[rid];
        const t = Date.now();
        for (let i = 0; i < curQty[rid]; i++) {
            cart.push({ ...p, sel: "一般", pid: rid, t: t + i });
        }
        renderCart();
    }

    function renderCart() {
        let summ = {};
        cart.forEach(it => {
            let k = it.n;
            summ[k] = (summ[k] || 0) + 1;
        });
        document.getElementById('cart-items').innerHTML = Object.keys(summ).map(k => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #EEE;">
                <span>${k}</span>
                <span>x ${summ[k]}</span>
            </div>
        `).join('');
        document.getElementById('cart-total').innerText = cart.reduce((a, b) => a + b.p, 0);
    }

    function submitOrder() {
        const n = document.getElementById('nick').value.trim();
        if (!n || cart.length === 0) return alert("請填寫暱稱與商品");
        db.ref('orders').push({
            nick: n,
            items: cart,
            total: cart.reduce((a, b) => a + b.p, 0),
            time: Date.now(),
            isUnlocked: false
        }).then(() => {
            alert("訂單已提交！");
            location.reload();
        });
    }

    // 4. 管理後台功能
    function adminLogin() {
        if (prompt("管理密碼") === "1239") {
            document.getElementById('admin-panel').style.display = 'flex';
            renderAdminOrders();
        }
    }

    function renderAdminOrders() {
        const main = document.getElementById('admin-main');
        document.getElementById('modal-title').innerText = "訂單管理";
        let html = Object.entries(orders).sort((a,b)=>a[1].time-b[1].time).map(([k, o]) => `
            <div class="admin-order-card">
                <b>👤 ${o.nick}</b> <span style="color:var(--caramel);">($${o.total})</span>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-add" style="padding:5px 10px;" onclick="copyToLine('${k}')">複製明細</button>
                    <button class="btn-add" style="padding:5px 10px; background:#BC6C25;" onclick="toggleUnlock('${k}')">${o.isUnlocked ? '🔒 鎖定' : '🔓 解鎖'}</button>
                    <button class="btn-add" style="padding:5px 10px; background:#888;" onclick="deleteOrder('${k}')">🗑️ 刪除</button>
                </div>
            </div>
        `).join('');
        main.innerHTML = html || "目前無訂單";
    }

    function renderAdminProds() {
        const main = document.getElementById('admin-main');
        document.getElementById('modal-title').innerText = "商品維護";
        main.innerHTML = `<button class="btn-add" style="width:100%; margin-bottom:15px;" onclick="openEdit(-1)">＋ 新增商品</button>` + 
            products.map((p, i) => `
                <div class="admin-order-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>[${p.e}] ${p.n}</b><br><small>$${p.p} / ¥${p.p_jpy || 0}</small></div>
                    <button class="btn-add" onclick="openEdit(${i})">編輯</button>
                </div>
            `).join('');
    }

    function openEdit(idx) {
        const isNew = idx === -1;
        const p = isNew ? {e:'', n:'', p:0, limit:999, p_jpy:0} : products[idx];
        document.getElementById('modal-title').innerText = isNew ? "新增商品" : "編輯商品";
        document.getElementById('modal-body').innerHTML = `
            場次：<input id="inp-e" class="input-std" value="${p.e}">
            名稱：<input id="inp-n" class="input-std" value="${p.n}">
            台幣：<input id="inp-p" type="number" class="input-std" value="${p.p}">
            日幣：<input id="inp-pj" type="number" class="input-std" value="${p.p_jpy || 0}">
            限購：<input id="inp-l" type="number" class="input-std" value="${p.limit}">
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            let nP = [...products];
            let obj = {
                e: document.getElementById('inp-e').value,
                n: document.getElementById('inp-n').value,
                p: parseInt(document.getElementById('inp-p').value),
                p_jpy: parseInt(document.getElementById('inp-pj').value),
                limit: parseInt(document.getElementById('inp-l').value)
            };
            if(isNew) nP.push(obj); else nP[idx] = obj;
            db.ref('products').set(nP).then(() => document.getElementById('edit-modal').style.display='none');
        };
    }

    // 5. 配貨助手核心 (修正縮起問題)
    function openPackAssistant() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('modal-title').innerText = "📦 配貨助手";
        document.getElementById('admin-main').innerHTML = `
            <div class="admin-order-card">
                <b>1. 選擇場次：</b><br>
                ${evts.map(e => `<label style="display:block; margin:8px 0;"><input type="checkbox" class="evt-sel" value="${e}"> ${e}</label>`).join('')}
                <button class="btn-add" style="width:100%; margin-top:10px;" onclick="stepShowOrders()">下一步</button>
            </div>
        `;
    }

    function stepShowOrders() {
        const selEvts = Array.from(document.querySelectorAll('.evt-sel:checked')).map(el => el.value);
        if(!selEvts.length) return alert("請選擇場次");
        
        let html = `<div class="admin-order-card"><b>2. 選擇訂單：</b><br>`;
        Object.entries(orders).forEach(([k, o]) => {
            if ((o.items || []).some(it => selEvts.includes(it.e))) {
                html += `<label style="display:block; margin:5px 0;"><input type="checkbox" class="ord-sel" value="${k}" checked> ${o.nick}</label>`;
            }
        });
        html += `<button class="btn-add" style="width:100%; margin-top:10px;" onclick="stepShowDetail()">開始配貨</button></div>`;
        document.getElementById('admin-main').innerHTML = html;
        window.tempSelEvts = selEvts;
    }

    function stepShowDetail() {
        const keys = Array.from(document.querySelectorAll('.ord-sel:checked')).map(el => el.value);
        const selEvts = window.tempSelEvts;
        if(!keys.length) return alert("請選擇訂單");

        let html = "";
        keys.forEach(k => {
            const o = orders[k];
            html += `<div class="admin-order-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>👤 ${o.nick}</b>
                    <button class="btn-add" style="font-size:12px; background:var(--caramel);" onclick="copyPackCheck('${k}', '${selEvts.join(",")}')">📋 複製對帳卡</button>
                </div><hr>`;
            (o.items || []).forEach((it, idx) => {
                if (selEvts.includes(it.e)) {
                    const isC = it.isShipped || false;
                    const nodeKey = `${k}_${idx}`;
                    tempPackStatus[nodeKey] = isC;
                    html += `<div id="pack-${nodeKey}" class="pack-item ${isC ? 'active' : ''}" onclick="togglePackNode('${k}', ${idx})">
                        <span id="icon-${nodeKey}">${isC ? '✅' : '⬜'}</span> ${it.n}
                    </div>`;
                }
            });
            html += `</div>`;
        });

        html += `<button class="btn-add" style="width:100%; padding:15px; background:var(--matcha);" onclick="savePackStatus()">🚀 保存出貨狀態並更新</button>`;
        document.getElementById('admin-main').innerHTML = html;
    }

    function togglePackNode(k, idx) {
        const key = `${k}_${idx}`;
        tempPackStatus[key] = !tempPackStatus[key];
        const node = document.getElementById(`pack-${key}`);
        const icon = document.getElementById(`icon-${key}`);
        if (tempPackStatus[key]) {
            node.classList.add('active');
            icon.innerText = '✅';
        } else {
            node.classList.remove('active');
            icon.innerText = '⬜';
        }
    }

    function savePackStatus() {
        let updates = {};
        for (let key in tempPackStatus) {
            let [ok, idx] = key.split('_');
            updates[`orders/${ok}/items/${idx}/isShipped`] = tempPackStatus[key];
        }
        db.ref().update(updates).then(() => {
            alert("保存成功！");
            renderAdminOrders();
        });
    }

    // 6. 輔助功能
    function copyPackCheck(k, evtsStr) {
        const o = orders[k];
        const evts = evtsStr.split(',');
        let win = [];
        (o.items || []).forEach((it, idx) => {
            if (evts.includes(it.e) && tempPackStatus[`${k}_${idx}`] === true) {
                win.push(`- [${it.e}] ${it.n}`);
            }
        });
        let txt = `🌟 【33日本動物園 - 出貨對帳】 🌟\n👤 暱稱：${o.nick}\n\n✅ 【本批出貨明細】：\n${win.join('\n') || '(無)'}\n\n以上資訊請核對，謝謝您 🙏`;
        navigator.clipboard.writeText(txt).then(() => alert("對帳卡已複製"));
    }

    function toggleUnlock(k) {
        db.ref(`orders/${k}`).update({ isUnlocked: !orders[k].isUnlocked });
    }

    function deleteOrder(k) {
        if(confirm("確定刪除此訂單？")) db.ref(`orders/${k}`).remove();
    }

    function copyToLine(k) {
        const o = orders[k];
        let txt = `👤 暱稱：${o.nick}\n💰 總計：$${o.total}\n內容：\n` + o.items.map(it => `- ${it.n}`).join('\n');
        navigator.clipboard.writeText(txt).then(() => alert("明細已複製"));
    }

    function performSearch() {
        const n = document.getElementById('search-nick').value.trim().toLowerCase();
        let res = Object.entries(orders).filter(([k, o]) => o.nick.toLowerCase() === n);
        document.getElementById('search-results-area').innerHTML = res.map(([k, o]) => 
            `<div class="admin-order-card">${new Date(o.time).toLocaleString()}<br>金額: $${o.total}</div>`
        ).join('');
    }
</script>
</body>
</html>
