<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --matcha: #606C38; --rice: #FEF9EF; --caramel: #BC6C25; --wood: #283618; --gray: #F4F1EA; --baby-blue: #E0F2FE; --profit-green: #2A9D8F; }
        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; background: var(--gray); color: var(--wood); }
        .top-nav { background: var(--rice); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EAE2D1; }
        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; }
        .panel-box { background: #FFF; border-radius: 12px; border: 1px solid #EAE2D1; padding: 20px; margin-bottom: 20px; }
        .btn-action { background: var(--matcha); color: #FFF; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; }
        .input-std { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #DDD; border-radius: 6px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-box { background: var(--rice); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-weight:bold; color:var(--matcha);">🐾 33日本動物園 - 園長管理後台</div>
    <div style="display:flex; gap:10px;">
        <button onclick="switchTab('tab-admin')">⚙ 管理</button>
        <button onclick="switchTab('tab-orders')">📋 訂單與統計</button>
    </div>
</div>

<div id="tab-admin" class="view-section active">
    <div class="panel-box">
        <button class="btn-action" onclick="openAddProdModal()">＋ 上架/編輯商品與庫存</button>
    </div>
</div>

<div id="tab-orders" class="view-section">
    <div class="panel-box" style="background:#FFFBEB;">
        <h3 style="margin-top:0;">🛒 採購與庫存統計看板</h3>
        <div id="stats-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px;"></div>
    </div>
    <div id="admin-orders-list"></div>
</div>

<div id="edit-modal" class="modal"><div class="modal-box"><h3 id="modal-title">編輯商品</h3><div id="modal-body"></div><button onclick="saveProduct()" style="width:100%; padding:10px; margin-top:10px;">儲存</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4", authDomain: "zoo-62638.firebaseapp.com", databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com", projectId: "zoo-62638" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let products = [], orders = {};

    db.ref('products').on('value', snap => { products = snap.val() || []; updateDashboard(); });
    db.ref('orders').on('value', snap => { orders = snap.val() || {}; updateDashboard(); });

    function updateDashboard() {
        renderOrders();
        renderStats();
    }

    // 統計邏輯
    function renderStats() {
        let stats = {};
        Object.values(orders).filter(o => o.status !== 'archived').forEach(o => {
            (Array.isArray(o.items) ? o.items : []).forEach(it => {
                let key = it.n + (it.sel || '');
                if (!stats[key]) stats[key] = { name: it.n, spec: it.sel, ordered: 0 };
                stats[key].ordered += 1;
            });
        });

        let html = '';
        products.forEach(p => {
            let key = p.n + (p.s || '');
            let ordered = stats[key] ? stats[key].ordered : 0;
            let stock = parseInt(p.stock) || 0;
            let remaining = stock - ordered;
            html += `<div style="background:#FFF; padding:10px; border-radius:8px; border:1px solid #DDD;">
                <b>${p.n}</b><br>
                總庫存: ${stock} | 已訂: ${ordered}<br>
                <b style="color:${remaining < 0 ? 'red' : 'green'}">剩餘可售: ${remaining}</b>
            </div>`;
        });
        document.getElementById('stats-container').innerHTML = html;
    }

    function renderOrders() {
        const main = document.getElementById('admin-orders-list');
        let filtered = Object.entries(orders).filter(([k, o]) => o.status !== 'archived');
        main.innerHTML = filtered.map(([k, o]) => `
            <div class="panel-box">
                👤 ${o.nick} | $${o.total}
                <button onclick="archiveOrder('${k}')">結清</button>
            </div>`).join('');
    }

    function archiveOrder(k) { db.ref('orders/'+k+'/status').set('archived'); }

    function openAddProdModal() {
        document.getElementById('modal-body').innerHTML = `
            名稱:<input id="p-n" class="input-std">
            總庫存:<input id="p-stock" type="number" class="input-std">
            售價:<input id="p-p" type="number" class="input-std">`;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function saveProduct() {
        let p = {
            n: document.getElementById('p-n').value,
            stock: document.getElementById('p-stock').value,
            p: document.getElementById('p-p').value
        };
        products.push(p);
        db.ref('products').set(products).then(() => {
            document.getElementById('edit-modal').style.display = 'none';
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
