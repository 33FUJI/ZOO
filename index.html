<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --matcha: #606C38;
            --rice: #FEF9EF;
            --caramel: #BC6C25;
            --wood: #283618;
            --gray: #F4F1EA;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Sans TC', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--gray);
            overflow: hidden;
            color: var(--wood);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* 大廳 */
        .hall {
            position: fixed;
            inset: 0;
            background: var(--rice);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .grid-hall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .card-hall {
            background: #FFF;
            padding: 25px 10px;
            border-radius: 15px;
            border: 1px solid #EAE2D1;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #EAE2D1;
            font-weight: bold;
            color: var(--matcha);
            font-size: 16px;
        }

        /* 商店主程式 */
        .app-container {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        .list-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: var(--gray);
        }

        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .prod-card {
            background: #FFF;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 280px;
        }

        .cart-area {
            width: 360px;
            background: #FFF;
            border-left: 1px solid #DDD;
            display: flex;
            flex-direction: column;
        }

        .cart-bottom {
            padding: 15px;
            border-top: 1px solid #EEE;
            background: #FFF;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .btn-add {
            background: var(--matcha);
            color: #FFF;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 管理面板 */
        #admin-panel {
            position: fixed;
            inset: 0;
            background: #F8F9FA;
            z-index: 4000;
            display: none;
            flex-direction: column;
        }

        .admin-header {
            background: var(--wood);
            color: #FFF;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-nav {
            padding: 10px;
            background: #EEE;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #DDD;
        }

        /* 彈窗恢復原始樣式 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 15px;
        }

        .modal-box {
            background: var(--rice);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .input-std {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #DDD;
            border-radius: 10px;
        }

        .pack-item {
            cursor: pointer;
            padding: 12px;
            border: 1px solid #EAE2D1;
            margin: 8px 0;
            border-radius: 12px;
            background: #FFF;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pack-item.active {
            border-color: var(--caramel);
            background: #FEF9EF;
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .cart-area { width: 100%; }
        }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="document.getElementById('search-modal').style.display='flex'" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area"><div id="prod-list" class="prod-grid"></div></div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold; background:#FDFDFD; border-bottom:1px solid #EEE;">🛒 購物清單</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="cart-bottom">
            <p style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin:5px 0;">總計: <span style="color:var(--caramel);">$ <span id="cart-total">0</span></span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button class="btn-add" style="width:100%; padding:16px; font-size:18px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999; font-size:13px;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header">
        <b>33 園長工作台</b>
        <button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button>
    </div>
    <div class="admin-nav">
        <button class="btn-add" onclick="renderAdminOrders()">訂單管理</button>
        <button class="btn-add" style="background:#BC6C25;" onclick="unlockAllOrders()">🔓 一鍵全開</button>
        <button class="btn-add" style="background:#888;" onclick="renderAdminProds()">商品維護</button>
        <button class="btn-add" style="background:#E07A5F;" onclick="openPackAssistant()">📦 配貨助手</button>
    </div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px; background:var(--gray);"></div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title">標題</h3>
        <div id="modal-body"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-add" id="modal-save" style="flex:1;">儲存</button>
            <button class="btn-add" style="flex:1; background:#999;" onclick="document.getElementById('edit-modal').style.display='none'">取消</button>
        </div>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <h2 style="text-align:center;">個人訂單查詢</h2>
        <input id="search-nick" class="input-std" placeholder="您的 LINE 暱稱">
        <div id="search-results-area"></div>
        <button class="btn-add" style="width:100%; padding:15px;" onclick="performSearch()">開始查詢</button>
        <button onclick="document.getElementById('search-modal').style.display='none'" style="background:none; border:none; color:#666; width:100%; margin-top:10px;">關閉</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], orders = {}, cart = [], curQty = {}, tempPackStatus = {};

    db.ref('products').on('value', snap => { products = snap.val() || []; renderHall(); });
    db.ref('orders').on('value', snap => { orders = snap.val() || {}; if(document.getElementById('admin-panel').style.display==='flex') renderAdminOrders(); });

    function renderHall() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('hall-grid').innerHTML = evts.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }

    function openShop(e) {
        document.getElementById('hall-screen').style.display='none'; document.getElementById('main-app').style.display='flex';
        const list = products.filter(p => p.e === e);
        document.getElementById('prod-list').innerHTML = list.map(p => {
            const rid = products.indexOf(p); if(!curQty[rid]) curQty[rid] = 1;
            return `<div class="prod-card">
                <div class="prod-name">${p.n}</div><div class="prod-price">$${p.p}</div>
                <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin:10px 0;">
                    <button class="btn-add" style="padding:5px 12px; background:#DDD; color:#333;" onclick="updateQty(${rid},-1)">-</button>
                    <span id="qty-val-${rid}">${curQty[rid]}</span>
                    <button class="btn-add" style="padding:5px 12px; background:#DDD; color:#333;" onclick="updateQty(${rid},1)">+</button>
                </div>
                <button class="btn-add" onclick="addToCart(${rid})">加入購物車</button>
            </div>`;
        }).join('');
    }

    function updateQty(rid, d) { let v = (curQty[rid] || 1) + d; if(v < 1) v = 1; curQty[rid] = v; document.getElementById(`qty-val-${rid}`).innerText = v; }
    function backToHall() { document.getElementById('main-app').style.display='none'; document.getElementById('hall-screen').style.display='flex'; }
    function addToCart(rid) { const p = products[rid]; for(let i=0; i<curQty[rid]; i++) cart.push({...p, sel: "一般", pid: rid, t: Date.now()+i}); renderCart(); }
    function renderCart() {
        let summ = {}; cart.forEach(it => { summ[it.n] = (summ[it.n]||0)+1; });
        document.getElementById('cart-items').innerHTML = Object.keys(summ).map(k => `<div>${k} x ${summ[k]}</div>`).join('');
        document.getElementById('cart-total').innerText = cart.reduce((a,b)=>a+b.p,0);
    }
    function submitOrder() {
        const n = document.getElementById('nick').value.trim();
        if(!n || cart.length===0) return alert("填寫暱稱及選購");
        db.ref('orders').push({ nick: n, items: cart, total: cart.reduce((a,b)=>a+b.p,0), time: Date.now() }).then(() => location.reload());
    }

    function adminLogin() { if(prompt("密碼")==="1239") { document.getElementById('admin-panel').style.display='flex'; renderAdminOrders(); } }
    function renderAdminOrders() {
        document.getElementById('admin-main').innerHTML = Object.entries(orders).map(([k, o]) => `
            <div class="admin-order-card"><b>${o.nick}</b> ($${o.total}) <button onclick="copyToLine('${k}')">複製明細</button></div>
        `).join('');
    }

    // 配貨助手 - 恢復原本的彈窗排版
    function openPackAssistant() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('modal-title').innerText = "📦 配貨助手";
        document.getElementById('modal-body').innerHTML = `
            <div id="p-step1">
                ${evts.map(e => `<div><input type="checkbox" class="evt-sel" value="${e}"> ${e}</div>`).join('')}
                <button class="btn-add" style="width:100%; margin-top:15px;" onclick="packStep2()">下一步</button>
            </div>
            <div id="p-step2" style="display:none;"></div>
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').style.display = 'none';
    }

    function packStep2() {
        const selEvts = Array.from(document.querySelectorAll('.evt-sel:checked')).map(el => el.value);
        let html = `<b>選擇訂單：</b>`;
        Object.entries(orders).forEach(([k, o]) => {
            if ((o.items || []).some(it => selEvts.includes(it.e))) {
                html += `<div><input type="checkbox" class="ord-sel" value="${k}" checked> ${o.nick}</div>`;
            }
        });
        html += `<button class="btn-add" style="width:100%; margin-top:15px;" onclick="packFinal('${selEvts.join(',')}')">開始配貨</button>`;
        document.getElementById('p-step1').style.display = 'none';
        document.getElementById('p-step2').innerHTML = html;
        document.getElementById('p-step2').style.display = 'block';
    }

    function packFinal(evtsStr) {
        const selEvts = evtsStr.split(',');
        const keys = Array.from(document.querySelectorAll('.ord-sel:checked')).map(el => el.value);
        let html = "";
        keys.forEach(k => {
            const o = orders[k];
            html += `<div style="margin-bottom:15px; border-bottom:1px solid #EEE; padding-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>👤 ${o.nick}</b>
                    <button class="btn-add" style="font-size:11px;" onclick="copyPackCheck('${k}', '${evtsStr}')">📋 複製對帳卡</button>
                </div>`;
            (o.items || []).forEach((it, idx) => {
                if (selEvts.includes(it.e)) {
                    const nodeKey = `${k}_${idx}`;
                    tempPackStatus[nodeKey] = it.isShipped || false;
                    html += `<div id="pack-${nodeKey}" class="pack-item ${tempPackStatus[nodeKey] ? 'active' : ''}" onclick="togglePackNode('${k}', ${idx})">
                        <span id="icon-${nodeKey}">${tempPackStatus[nodeKey] ? '✅' : '⬜'}</span> ${it.n}
                    </div>`;
                }
            });
            html += `</div>`;
        });
        document.getElementById('p-step2').innerHTML = html;
        document.getElementById('modal-save').style.display = 'block';
        document.getElementById('modal-save').innerText = "🚀 保存出貨狀態";
        document.getElementById('modal-save').onclick = () => {
            let updates = {};
            for(let key in tempPackStatus) { let [ok, idx] = key.split('_'); updates[`orders/${ok}/items/${idx}/isShipped`] = tempPackStatus[key]; }
            db.ref().update(updates).then(() => { alert("已保存"); location.reload(); });
        };
    }

    function togglePackNode(k, idx) {
        const key = `${k}_${idx}`;
        tempPackStatus[key] = !tempPackStatus[key];
        const node = document.getElementById(`pack-${key}`);
        const icon = document.getElementById(`icon-${key}`);
        if(tempPackStatus[key]) { node.classList.add('active'); icon.innerText = '✅'; }
        else { node.classList.remove('active'); icon.innerText = '⬜'; }
    }

    // 複製對帳卡：有勾 ✅ 出現在「到貨」，沒勾 ⬜ 出現在「等候」
    function copyPackCheck(k, evtsStr) {
        const o = orders[k];
        const selEvts = evtsStr.split(',');
        let arrived = [];
        let waiting = [];

        (o.items || []).forEach((it, idx) => {
            if (selEvts.includes(it.e)) {
                const nodeKey = `${k}_${idx}`;
                if (tempPackStatus[nodeKey]) arrived.push(`- [${it.e}] ${it.n}`);
                else waiting.push(`- [${it.e}] ${it.n}`);
            }
        });

        let txt = `🌟 【33日本動物園 - 出貨對帳】 🌟\n\n👤 暱稱：${o.nick}\n\n✅ 【本批到貨商品】：\n${arrived.join('\n') || '(無)'}\n`;
        if (waiting.length > 0) txt += `\n⏳ 【尚在等候中】：\n${waiting.join('\n')}\n`;
        txt += `\n以上資訊請核對，謝謝您 🙏`;
        navigator.clipboard.writeText(txt).then(() => alert("對帳卡已複製！"));
    }

    function copyToLine(k) {
        const o = orders[k];
        let txt = `👤 ${o.nick}\n💰 $${o.total}\n` + o.items.map(it => `- ${it.n}`).join('\n');
        navigator.clipboard.writeText(txt).then(() => alert("明細已複製"));
    }
    
    function performSearch() {
        const n = document.getElementById('search-nick').value.trim().toLowerCase();
        let res = Object.entries(orders).filter(([k, o]) => o.nick.toLowerCase() === n);
        document.getElementById('search-results-area').innerHTML = res.map(([k, o]) => `<div style="padding:10px; background:#FFF; margin-top:5px; border-radius:8px;">${new Date(o.time).toLocaleString()}<br>金額: $${o.total}</div>`).join('');
    }
</script>
</body>
</html>
