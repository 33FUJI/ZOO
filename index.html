<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --matcha: #606C38; --rice: #FEF9EF; --caramel: #BC6C25; --wood: #283618; --gray: #F4F1EA; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }

        /* 入口大廳 */
        .hall { position: fixed; inset: 0; background: var(--rice); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .grid-hall { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .card-hall { background: #FFF; padding: 25px 10px; border-radius: 15px; border: 1px solid #EAE2D1; text-align: center; cursor: pointer; box-shadow: 0 4px 0 #EAE2D1; font-weight: bold; color: var(--matcha); transition: 0.2s; }
        .card-hall:active { transform: translateY(2px); box-shadow: 0 2px 0 #EAE2D1; }

        /* 主程式佈局 */
        .app-container { display: none; flex: 1; overflow: hidden; flex-direction: row; }
        .list-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--gray); }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        
        /* 商品卡片 */
        .prod-card { background: #FFF; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-height: 280px; }
        .prod-name { font-size: 16px; font-weight: bold; min-height: 45px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .prod-price { color: var(--caramel); font-size: 18px; margin: 8px 0; font-weight: bold; text-align: center; }
        .spec-area { min-height: 60px; margin-bottom: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        .spec-btn { border: 1px solid #DDD; margin: 2px; font-size: 11px; padding: 4px 8px; border-radius: 4px; cursor: pointer; background: #FFF; }
        .spec-btn.active { background: #EAE2D1; border-color: var(--caramel); color: var(--caramel); }
        
        .qty-area { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #DDD; background: #FFF; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* 右側購物車 */
        .cart-area { width: 360px; background: #FFF; border-left: 1px solid #DDD; display: flex; flex-direction: column; }
        .cart-items-container { flex: 1; overflow-y: auto; padding: 10px; }
        .cart-bottom { padding: 15px; border-top: 1px solid #EEE; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        .btn-add { background: var(--matcha); color: #FFF; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add:disabled { background: #CCC; }

        /* 管理後台 */
        #admin-panel { position: fixed; inset: 0; background: #F8F9FA; z-index: 4000; display: none; flex-direction: column; }
        .admin-header { background: var(--wood); color: #FFF; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .admin-nav { padding: 10px; background: #EEE; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #DDD; }
        .admin-order-card { background: #FFF; border: 1px solid #EEE; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }

        /* 彈窗樣式 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .input-std { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #DDD; border-radius: 10px; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .cart-area { width: 100%; flex: 1.5; }
            .prod-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="openSearchModal()" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area">
        <div id="prod-list" class="prod-grid"></div>
    </div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold; background:#FDFDFD; border-bottom:1px solid #EEE;">🛒 購物清單</div>
        <div id="cart-items" class="cart-items-container"></div>
        <div class="cart-bottom">
            <p style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin:5px 0;">總計: <span style="color:var(--caramel);">$ <span id="cart-total">0</span></span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button class="btn-add" style="padding:16px; font-size:18px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999; font-size:13px;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header">
        <b>33 園長工作台</b>
        <div>
            <select id="admin-event-filter" onchange="renderAdminOrders()">
                <option value="ALL">所有場次</option>
            </select>
            <button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button>
        </div>
    </div>
    <div class="admin-nav">
        <button class="btn-add" style="width:auto; padding:8px 15px;" onclick="renderAdminOrders()">訂單管理</button>
        <button class="btn-add" style="width:auto; padding:8px 15px; background:#BC6C25;" onclick="unlockAllOrders()">🔓 一鍵全開</button>
        <button class="btn-add" style="width:auto; padding:8px 15px; background:#888;" onclick="renderAdminProds()">商品維護</button>
        <button class="btn-add" style="width:auto; padding:8px 15px; background:#E07A5F;" onclick="openPackAssistant()">📦 配貨助手</button>
        <button class="btn-add" style="width:auto; padding:8px 15px; background:#4361EE;" onclick="askExport('summary')">📊 統計</button>
        <button class="btn-add" style="width:auto; padding:8px 15px; background:#7209B7;" onclick="askExport('detail')">📋 明細</button>
    </div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px; background:var(--gray);"></div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-box">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-add" id="modal-save" style="flex:1;">儲存</button>
            <button class="btn-add" style="flex:1; background:#999;" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <h2>訂單查詢</h2>
        <input id="search-nick" class="input-std" placeholder="輸入您的 LINE 暱稱">
        <div id="search-results-area" style="margin-top:15px;"></div>
        <button class="btn-add" style="margin-top:10px;" onclick="performSearch()">搜尋</button>
        <button onclick="document.getElementById('search-modal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#666;">關閉</button>
    </div>
</div>

<script>
    // Firebase 初始化
    const firebaseConfig = { 
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4", 
        authDomain: "zoo-62638.firebaseapp.com", 
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com", 
        projectId: "zoo-62638", 
        storageBucket: "zoo-62638.firebasestorage.app", 
        messagingSenderId: "33012710753", 
        appId: "1:33012710753:web:318636add1f5ac2f7b5920" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 全域變數
    let products = [];
    let orders = {};
    let cart = [];
    let curSpecMap = {};
    let curQtyMap = {};
    let currentEventName = "";
    let tempPackStatus = {};

    // 資料監聽
    db.ref('products').on('value', snap => {
        products = snap.val() || [];
        renderHall();
        updateAdminFilter();
        if(currentEventName) openShop(currentEventName);
    });

    db.ref('orders').on('value', snap => {
        orders = snap.val() || {};
        if(document.getElementById('admin-panel').style.display === 'flex') {
            renderAdminOrders();
        }
    });

    // 渲染大廳
    function renderHall() {
        const events = [...new Set(products.map(p => p.e))].filter(e => e);
        const grid = document.getElementById('hall-grid');
        grid.innerHTML = events.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }

    function updateAdminFilter() {
        const events = [...new Set(products.map(p => p.e))].filter(e => e);
        const filter = document.getElementById('admin-event-filter');
        filter.innerHTML = '<option value="ALL">所有場次</option>' + events.map(e => `<option value="${e}">${e}</option>`).join('');
    }

    // 進入商店
    function openShop(eventName) {
        currentEventName = eventName;
        document.getElementById('hall-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        
        const listArea = document.getElementById('prod-list');
        const filtered = products.filter(p => p.e === eventName);

        listArea.innerHTML = filtered.map(p => {
            const realIdx = products.indexOf(p);
            if(!curQtyMap[realIdx]) curQtyMap[realIdx] = 1;
            
            const specs = p.s ? p.s.split(/,|，/).filter(x => x.trim()) : [];
            const specButtons = specs.map(v => `
                <button class="spec-btn ${curSpecMap[realIdx] === v ? 'active' : ''}" onclick="selectSpec(${realIdx}, '${v}')">${v}</button>
            `).join('');

            return `
                <div class="prod-card">
                    <div>
                        <div class="prod-name">${p.n}</div>
                        <div class="prod-price">$${p.p}</div>
                        <div class="spec-area">${specButtons}</div>
                    </div>
                    <div class="qty-area">
                        <button class="btn-qty" onclick="changeQty(${realIdx}, -1)">-</button>
                        <span id="qty-disp-${realIdx}">${curQtyMap[realIdx]}</span>
                        <button class="btn-qty" onclick="changeQty(${realIdx}, 1)">+</button>
                    </div>
                    <button class="btn-add" onclick="addToCart(${realIdx})">加入購物車</button>
                </div>
            `;
        }).join('');
    }

    function selectSpec(idx, val) {
        curSpecMap[idx] = val;
        openShop(currentEventName);
    }

    function changeQty(idx, delta) {
        curQtyMap[idx] = Math.max(1, (curQtyMap[idx] || 1) + delta);
        document.getElementById(`qty-disp-${idx}`).innerText = curQtyMap[idx];
    }

    function backToHall() {
        currentEventName = "";
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('hall-screen').style.display = 'flex';
    }

    // 購物車功能
    function addToCart(idx) {
        const p = products[idx];
        const specs = p.s ? p.s.split(/,|，/).filter(x => x.trim()) : [];
        if(specs.length > 0 && !curSpecMap[idx]) {
            alert("請先選擇規格！");
            return;
        }
        
        const count = curQtyMap[idx] || 1;
        for(let i=0; i<count; i++) {
            cart.push({
                ...p,
                selectedSpec: curSpecMap[idx] || "一般",
                productIndex: idx,
                cartTimestamp: Date.now()
            });
        }
        renderCart();
    }

    function renderCart() {
        const cartItems = document.getElementById('cart-items');
        let summary = {};
        cart.forEach(item => {
            const key = `${item.productIndex}_${item.selectedSpec}`;
            if(!summary[key]) summary[key] = { name: item.n, spec: item.selectedSpec, count: 0, pIdx: item.productIndex };
            summary[key].count++;
        });

        cartItems.innerHTML = Object.keys(summary).map(key => {
            const item = summary[key];
            return `
                <div style="padding:10px 0; border-bottom:1px solid #EEE; display:flex; justify-content:space-between; align-items:center;">
                    <span>${item.name} (${item.spec}) x ${item.count}</span>
                    <button onclick="removeFromCart(${item.pIdx}, '${item.spec}')" style="color:red; border:none; background:none; cursor:pointer;">✕</button>
                </div>
            `;
        }).join('');

        const total = cart.reduce((sum, item) => sum + item.p, 0);
        document.getElementById('cart-total').innerText = total;
    }

    function removeFromCart(pIdx, spec) {
        cart = cart.filter(it => !(it.productIndex === pIdx && it.selectedSpec === spec));
        renderCart();
    }

    function submitOrder() {
        const nick = document.getElementById('nick').value.trim();
        if(!nick) return alert("請輸入 LINE 暱稱");
        if(cart.length === 0) return alert("購物車是空的");

        const orderData = {
            nick: nick,
            items: cart,
            total: cart.reduce((s, i) => s + i.p, 0),
            time: Date.now(),
            isUnlocked: false
        };

        db.ref('orders').push(orderData).then(() => {
            alert("訂單提交成功！");
            cart = [];
            location.reload();
        });
    }

    // 管理員功能
    function adminLogin() {
        const pass = prompt("請輸入管理密碼");
        if(pass === "1239") {
            document.getElementById('admin-panel').style.display = 'flex';
            renderAdminOrders();
        } else {
            alert("密碼錯誤");
        }
    }

    function renderAdminOrders() {
        const main = document.getElementById('admin-main');
        const filterVal = document.getElementById('admin-event-filter').value;
        
        let pool = {}; 
        Object.values(orders).forEach(o => {
            (o.items || []).forEach(it => {
                const key = `${it.productIndex}_${it.selectedSpec}`;
                if(!pool[key]) pool[key] = [];
                pool[key].push(it);
            });
        });
        for(let k in pool) pool[k].sort((a,b) => (a.cartTimestamp || 0) - (b.cartTimestamp || 0));

        let entries = Object.entries(orders);
        if(filterVal !== "ALL") {
            entries = entries.filter(([k, o]) => (o.items || []).some(it => it.e === filterVal));
        }

        main.innerHTML = `<button class="btn-add" style="margin-bottom:10px;" onclick="mergeOrders()">🔗 選擇訂單併單</button>` + 
        entries.sort((a,b) => a[1].time - b[1].time).map(([orderKey, o]) => {
            const itemsHtml = (o.items || []).map((it, idx) => {
                const limit = (products[it.productIndex] || {}).limit || 999;
                const rank = pool[`${it.productIndex}_${it.selectedSpec}`].indexOf(it) + 1;
                const win = it.forceWin || rank <= limit;
                
                return `
                    <div style="font-size:12px; border-bottom:1px dashed #DDD; padding:5px 0; display:flex; justify-content:space-between;">
                        <span>
                            [${it.e}] ${it.n}(${it.selectedSpec}) <b>$${it.p}</b> 
                            ${it.isShipped ? '<span style="color:blue;">[已出]</span>' : ''}
                            <b onclick="toggleForceWin('${orderKey}', ${idx}, ${!it.forceWin})" style="color:${win?'green':'orange'}; cursor:pointer; margin-left:5px;">
                                ${win ? '[正取]' : '[補位]'}
                            </b>
                        </span>
                        <span onclick="deleteItem('${orderKey}', ${idx})" style="color:red; cursor:pointer;">✕</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="admin-order-card">
                    <div>
                        <input type="checkbox" class="merge-chk" value="${orderKey}" data-nick="${o.nick}">
                        <b>${o.nick}</b> ($${o.total}) 
                        <span style="font-size:10px; color:#999;">${new Date(o.time).toLocaleString()}</span>
                    </div>
                    <div style="margin:8px 0;">${itemsHtml}</div>
                    <button class="btn-add" style="background:#4CAF50; margin-bottom:5px;" onclick="copyDetail('${orderKey}')">📋 複製明細</button>
                    <label class="status-label" style="display:block; padding:5px; background:#EEE; border-radius:5px;">
                        <input type="checkbox" ${o.isUnlocked ? 'checked' : ''} onchange="db.ref('orders/${orderKey}').update({isUnlocked: this.checked})"> 
                        允許查詢完整明細 (解鎖)
                    </label>
                </div>
            `;
        }).join('');
    }

    function toggleForceWin(orderKey, itemIdx, val) {
        db.ref(`orders/${orderKey}/items/${itemIdx}`).update({ forceWin: val });
    }

    function deleteItem(orderKey, itemIdx) {
        if(!confirm("確定要刪除這項商品嗎？")) return;
        let o = orders[orderKey];
        o.items.splice(itemIdx, 1);
        if(o.items.length === 0) {
            db.ref(`orders/${orderKey}`).remove();
        } else {
            db.ref(`orders/${orderKey}`).update({
                items: o.items,
                total: o.items.reduce((s, i) => s + i.p, 0)
            });
        }
    }

    function renderAdminProds() {
        const main = document.getElementById('admin-main');
        main.innerHTML = `<button class="btn-add" style="margin-bottom:15px;" onclick="openEditModal(-1)">＋ 新增商品</button>` + 
        products.map((p, i) => `
            <div class="admin-order-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>[${p.e}] <b>${p.n}</b> - 台幣$${p.p} / 日幣¥${p.p_jpy||0}</span>
                <button onclick="openEditModal(${i})" style="padding:5px 10px;">編輯</button>
            </div>
        `).join('');
    }

    function openEditModal(idx) {
        const p = idx === -1 ? {e:'', n:'', p:0, p_jpy:0, limit:999, s:''} : products[idx];
        document.getElementById('modal-title').innerText = idx === -1 ? "新增商品" : "編輯商品";
        document.getElementById('modal-body').innerHTML = `
            場次：<input id="inp-e" class="input-std" value="${p.e}">
            名稱：<input id="inp-n" class="input-std" value="${p.n}">
            台幣售價：<input id="inp-p" type="number" class="input-std" value="${p.p}">
            日幣原價：<input id="inp-pj" type="number" class="input-std" value="${p.p_jpy||0}">
            正取限額：<input id="inp-l" type="number" class="input-std" value="${p.limit||999}">
            規格(用逗號隔開)：<input id="inp-s" class="input-std" value="${p.s || ''}">
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const newP = {
                e: document.getElementById('inp-e').value,
                n: document.getElementById('inp-n').value,
                p: parseInt(document.getElementById('inp-p').value) || 0,
                p_jpy: parseInt(document.getElementById('inp-pj').value) || 0,
                limit: parseInt(document.getElementById('inp-l').value) || 999,
                s: document.getElementById('inp-s').value
            };
            let updatedList = [...products];
            if(idx === -1) updatedList.push(newP);
            else updatedList[idx] = newP;
            db.ref('products').set(updatedList).then(() => closeModal());
        };
    }

    function closeModal() {
        document.getElementById('edit-modal').style.display = 'none';
    }

    // 配貨助手
    function openPackAssistant() {
        const events = [...new Set(products.map(p => p.e))].filter(e => e);
        tempPackStatus = {};
        document.getElementById('modal-title').innerText = "📦 配貨出貨助手";
        document.getElementById('modal-body').innerHTML = `
            請勾選要處理的場次：
            <div style="background:#FFF; padding:10px; border-radius:10px; margin-top:10px; border:1px solid #EEE;">
                ${events.map(e => `<div><label><input type="checkbox" class="ev-sel" value="${e}"> ${e}</label></div>`).join('')}
            </div>
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const selectedEvents = Array.from(document.querySelectorAll('.ev-sel:checked')).map(el => el.value);
            if(selectedEvents.length === 0) return alert("請選擇場次");
            showPackStep2(selectedEvents);
        };
    }

    function showPackStep2(selectedEvents) {
        let html = `請勾選要處理的訂單：<div style="max-height:300px; overflow-y:auto; background:#FFF; border-radius:10px; margin-top:10px;">`;
        Object.entries(orders).forEach(([key, o]) => {
            if((o.items || []).some(it => selectedEvents.includes(it.e))) {
                html += `<div style="padding:10px; border-bottom:1px solid #EEE;"><label><input type="checkbox" class="od-sel" value="${key}"> ${o.nick}</label></div>`;
            }
        });
        document.getElementById('modal-body').innerHTML = html + `</div>`;
        document.getElementById('modal-save').onclick = () => {
            const selectedOrderKeys = Array.from(document.querySelectorAll('.od-sel:checked')).map(el => el.value);
            if(selectedOrderKeys.length === 0) return alert("請選擇訂單");
            renderPackDetail(selectedOrderKeys, selectedEvents);
        };
    }

    function renderPackDetail(orderKeys, events) {
        let html = `<div style="font-size:11px; color:red; margin-bottom:10px;">點擊商品可切換「已拿取/未拿取」狀態，核對完請點儲存。</div>`;
        orderKeys.forEach(okey => {
            const o = orders[okey];
            let jpySumMap = {};
            let group = {};
            
            (o.items || []).forEach((it, idx) => {
                if(events.includes(it.e)) {
                    const prod = products[it.productIndex] || {};
                    jpySumMap[it.e] = (jpySumMap[it.e] || 0) + (prod.p_jpy || 0);
                    const gKey = `${it.e}_${it.n}_${it.selectedSpec}`;
                    if(!group[gKey]) group[gKey] = { it, ids: [], count: 0 };
                    group[gKey].ids.push(idx);
                    group[gKey].count++;
                }
            });

            let bonusHtml = "";
            for(let eName in jpySumMap) {
                const gifts = Math.floor(jpySumMap[eName] / 6000);
                bonusHtml += gifts > 0 ? `<div style="color:blue; font-weight:bold;">🎁 ${eName}: 滿額禮 x ${gifts}</div>` : `<div style="color:#999;">⚪ ${eName}: ¥${jpySumMap[eName]} (差 ${6000 - jpySumMap[eName]} 滿額)</div>`;
            }

            html += `
                <div style="border:1px solid #CCC; padding:10px; border-radius:10px; margin-bottom:10px; background:#FFF;">
                    <b>${o.nick}</b>
                    <div style="margin:5px 0; font-size:12px;">${bonusHtml}</div>
            `;
            
            for(let gK in group) {
                const g = group[gK];
                const isAllShipped = g.ids.every(id => tempPackStatus[`${okey}_${id}`] === undefined ? g.it.isShipped : tempPackStatus[`${okey}_${id}`]);
                html += `
                    <div onclick="togglePackGroup('${okey}','${g.ids.join(',')}',${!isAllShipped},'${events.join(',')}','${orderKeys.join(',')}')" 
                         style="padding:8px; border:1px solid #EEE; margin-top:5px; border-radius:5px; cursor:pointer; background:${isAllShipped ? '#FEF9EF' : '#FFF'};">
                        ${isAllShipped ? '✅' : '⬜'} ${g.it.n} (${g.it.selectedSpec}) x${g.count}
                    </div>
                `;
            }
            html += `</div>`;
        });

        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-save').innerText = "確認更新出貨狀態";
        document.getElementById('modal-save').onclick = () => {
            if(!confirm("確定要更新這些訂單的出貨狀態嗎？")) return;
            const updates = {};
            for(let key in tempPackStatus) {
                const [oK, iIdx] = key.split('_');
                updates[`orders/${oK}/items/${iIdx}/isShipped`] = tempPackStatus[key];
            }
            db.ref().update(updates).then(() => {
                alert("狀態已更新");
                closeModal();
            });
        };
    }

    function togglePackGroup(okey, ids, status, evtsStr, okeysStr) {
        ids.split(',').forEach(id => {
            tempPackStatus[`${okey}_${id}`] = status;
        });
        renderPackDetail(okeysStr.split(','), evtsStr.split(','));
    }

    // 其他輔助功能
    function mergeOrders() {
        const selected = Array.from(document.querySelectorAll('.merge-chk:checked'));
        if(selected.length < 2) return alert("請至少勾選兩筆訂單進行併單");
        
        const keys = selected.map(el => el.value);
        let mergedItems = [];
        let totalSum = 0;
        let firstNick = selected[0].dataset.nick;

        keys.forEach(k => {
            mergedItems = mergedItems.concat(orders[k].items || []);
            totalSum += orders[k].total;
        });

        if(confirm(`確定要將這 ${keys.length} 筆訂單併入 ${firstNick} 名下嗎？`)) {
            db.ref('orders').push({
                nick: firstNick,
                items: mergedItems,
                total: totalSum,
                time: Date.now(),
                isUnlocked: true
            }).then(() => {
                keys.forEach(k => db.ref(`orders/${k}`).remove());
                alert("併單成功！");
            });
        }
    }

    function copyDetail(key) {
        const o = orders[key];
        let text = `🌟 ${o.nick} 的預訂明細 🌟\n`;
        (o.items || []).forEach((it, i) => {
            text += `${i+1}. [${it.e}] ${it.n}(${it.selectedSpec}) $${it.p}\n`;
        });
        text += `\n總計：$${o.total}\n感謝您的支持！`;
        navigator.clipboard.writeText(text).then(() => alert("明細已複製到剪貼簿"));
    }

    function unlockAllOrders() {
        if(!confirm("確定要解鎖所有訂單，讓客人能查到明細嗎？")) return;
        const updates = {};
        Object.keys(orders).forEach(k => updates[`${k}/isUnlocked`] = true);
        db.ref('orders').update(updates).then(() => alert("已全部解鎖"));
    }

    function openSearchModal() {
        document.getElementById('search-modal').style.display = 'flex';
        document.getElementById('search-results-area').innerHTML = "";
    }

    function performSearch() {
        const nick = document.getElementById('search-nick').value.trim().toLowerCase();
        if(!nick) return alert("請輸入暱稱");

        const found = Object.entries(orders).filter(([k, o]) => o.nick.toLowerCase() === nick);
        const resArea = document.getElementById('search-results-area');

        if(found.length === 0) {
            resArea.innerHTML = "找不到您的訂單，請確認暱稱是否正確。";
            return;
        }

        resArea.innerHTML = found.map(([k, o]) => {
            let detail = "";
            if(o.isUnlocked) {
                detail = (o.items || []).map(it => `<div>- ${it.n} (${it.selectedSpec}) $${it.p}</div>`).join('');
            } else {
                detail = "<div style='color:orange; font-size:12px;'>⌛ 園長整理中，尚未解鎖明細</div>";
            }

            return `
                <div style="background:#FFF; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #EAE2D1;">
                    <div style="font-weight:bold; border-bottom:1px solid #EEE; padding-bottom:5px; margin-bottom:5px;">
                        ${new Date(o.time).toLocaleDateString()} 訂單
                    </div>
                    ${detail}
                    <div style="margin-top:10px; text-align:right; font-weight:bold; color:var(--caramel);">
                        應付總計：$${o.total}
                    </div>
                </div>
            `;
        }).join('');
    }

    function askExport(type) {
        const events = [...new Set(products.map(p => p.e))].filter(e => e);
        document.getElementById('modal-title').innerText = "資料匯出";
        document.getElementById('modal-body').innerHTML = `
            請勾選場次：
            <div style="margin-top:10px;">
                ${events.map(e => `<div><label><input type="checkbox" class="ex-evt" value="${e}" checked> ${e}</label></div>`).join('')}
            </div>
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const sel = Array.from(document.querySelectorAll('.ex-evt:checked')).map(el => el.value);
            let output = "";
            if(type === 'summary') {
                let s = {};
                Object.values(orders).forEach(o => (o.items || []).forEach(it => {
                    if(sel.includes(it.e)) {
                        const k = `[${it.e}] ${it.n} (${it.selectedSpec})`;
                        s[k] = (s[k] || 0) + 1;
                    }
                }));
                for(let k in s) output += `${k}：${s[k]}\n`;
            } else {
                Object.values(orders).forEach(o => {
                    const items = (o.items || []).filter(it => sel.includes(it.e));
                    if(items.length > 0) {
                        output += `\n【${o.nick}】\n`;
                        items.forEach(it => output += `- ${it.n} (${it.selectedSpec})\n`);
                    }
                });
            }
            const blob = new Blob([output], {type: "text/plain"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${type}_export.txt`;
            a.click();
            closeModal();
        };
    }
</script>
