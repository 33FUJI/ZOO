<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --matcha: #606C38; --rice: #FEF9EF; --caramel: #BC6C25; --wood: #283618; --gray: #F4F1EA; --baby-blue: #E0F2FE; --profit-green: #2A9D8F; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }
        .top-nav { background: var(--rice); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EAE2D1; }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .brand-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: var(--matcha); display: flex; align-items: center; gap: 6px; }
        .tag-admin { background: var(--wood); color: #FFF; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .nav-tabs { display: flex; gap: 5px; }
        .nav-tab { background: transparent; border: none; color: #666; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .nav-tab.active { background: var(--matcha); color: #FFF; }
        .btn-logout { background: #FFF; border: 1px solid #DDD; color: #666; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .view-section { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .view-section.active { display: block; }
        .panel-box { background: #FFF; border-radius: 12px; border: 1px solid #EAE2D1; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .panel-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--wood); border-bottom: 1px solid #EAE2D1; padding-bottom: 10px; }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; color: var(--wood); }
        .data-table th { color: var(--matcha); font-weight: bold; padding: 12px 8px; border-bottom: 1px solid #EAE2D1; background: var(--rice); }
        .data-table td { padding: 14px 8px; border-bottom: 1px solid #EAE2D1; }
        .status-badge { background: var(--baby-blue); color: #0369A1; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; margin-left: 4px; }
        .btn-edit { background: #FFF; color: var(--caramel); border: 1px solid var(--caramel); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-action { background: var(--matcha); color: #FFF; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; }
        .btn-qty { width: 26px; height: 26px; border-radius: 4px; border: 1px solid #DDD; background: #FFF; cursor: pointer; font-weight: bold; }
        .collapse-group { background: #FFF; border-radius: 12px; border: 1px solid #EAE2D1; margin-bottom: 15px; overflow: hidden; }
        .collapse-header { padding: 16px 20px; background: var(--rice); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .collapse-body { padding: 15px; display: block; background: #FFF; border-top: 1px solid #EAE2D1; }
        .front-container { position: fixed; inset: 0; background: var(--gray); z-index: 3000; display: flex; flex-direction: column; }
        .front-main { display: flex; flex: 1; overflow: hidden; }
        .front-content { flex: 1; overflow-y: auto; padding: 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .event-card { background: #FFF; border: 1px solid #EAE2D1; border-radius: 16px; padding: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.04); transition: transform 0.2s; text-align: center; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .prod-card { background: #FFF; border: 1px solid #EAE2D1; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .cart-panel { width: 360px; background: #FFF; border-left: 1px solid #EAE2D1; padding: 20px; display: flex; flex-direction: column; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); border: 1px solid #EAE2D1; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; }
        .input-std { width: 100%; padding: 10px; margin: 8px 0; background: #FFF; border: 1px solid #DDD; border-radius: 6px; }
    </style>
</head>
<body>

<div id="front-hall" class="front-container">
    <div class="top-nav">
        <div class="nav-brand"><div class="brand-title">🌿 33 日本動物園 連線大廳</div></div>
        <button class="btn-logout" onclick="promptAdmin()">管理登入</button>
    </div>
    <div class="front-main">
        <div class="front-content">
            <div id="front-event-layer">
                <h3 style="margin-top:0; color:var(--wood);">📌 請選擇場次：</h3>
                <div id="front-event-grid" class="event-grid"></div>
            </div>
            <div id="front-prod-layer" style="display:none;">
                <h3 id="current-selected-event-title" style="color:var(--matcha);">商品明細</h3>
                <div id="front-prod-grid" class="prod-grid"></div>
            </div>
        </div>
        <div class="cart-panel">
            <h3>🛒 購物車</h3>
            <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
            <div style="border-top:1px solid #EEE; padding-top:15px;">
                <p>總計: <span id="cart-total" style="color:var(--caramel); font-size:20px;">$ 0</span></p>
                <input id="customer-nick" class="input-std" placeholder="您的 LINE 暱稱">
                <button class="btn-action" style="width:100%" onclick="submitCartOrder()">確認提交</button>
            </div>
        </div>
    </div>
</div>

<div class="top-nav">
    <div class="nav-brand"><div class="brand-title">🐾 33日本動物園</div><div class="tag-admin">● 園長後台</div></div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('tab-events', this)">活動場次</button>
        <button class="nav-tab" onclick="switchTab('tab-admin', this)">⚙ 管理後台</button>
        <button class="nav-tab" onclick="switchTab('tab-orders', this)">📋 訂單記錄</button>
    </div>
    <button class="btn-logout" onclick="exitAdmin()">登出大廳</button>
</div>

<div class="main-container">
    <div id="tab-events" class="view-section active">
        <div class="panel-box">
            <div class="panel-title">📌 進行中場次</div>
            <div id="active-events-list" class="event-grid"></div>
        </div>
    </div>
    <div id="tab-admin" class="view-section">
        <button class="btn-action" onclick="openAddEventModal()">＋ 新增場次</button>
        <div class="panel-box" style="margin-top:20px;">
            <table class="data-table">
                <thead><tr><th>活動</th><th>狀態</th><th>操作</th></tr></thead>
                <tbody id="admin-events-table"></tbody>
            </table>
        </div>
    </div>
    <div id="tab-orders" class="view-section">
        <div class="panel-box"><div id="admin-orders-list"></div></div>
    </div>
</div>

<div id="edit-modal" class="modal"><div class="modal-box"><h3 id="modal-title"></h3><div id="modal-body"></div><div style="display:flex; gap:10px; margin-top:20px;"><button class="btn-action" id="modal-save" style="flex:1;">儲存</button><button class="btn-action" style="flex:1; background:#999;" onclick="closeModal()">取消</button></div></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let products = [], orders = {}, cart = [];

    db.ref('products').on('value', snap => { products = snap.val() || []; renderUI(); });
    db.ref('orders').on('value', snap => { orders = snap.val() || {}; renderOrders(); });

    function renderUI() {
        const evts = [...new Set(products.map(p => p.e))];
        document.getElementById('front-event-grid').innerHTML = evts.map(e => `<div class="event-card" onclick="selectEvent('${e}')"><h3>${e}</h3></div>`).join('');
        document.getElementById('admin-events-table').innerHTML = evts.map(e => `<tr><td>${e}</td><td>進行中</td><td><button class="btn-sm btn-edit" onclick="renderAdminProds('${e}')">維護</button></td></tr>`).join('');
    }

    function selectEvent(e) {
        document.getElementById('front-event-layer').style.display = 'none';
        document.getElementById('front-prod-layer').style.display = 'block';
        const filtered = products.filter(p => p.e === e);
        document.getElementById('front-prod-grid').innerHTML = filtered.map((p,i) => `<div class="prod-card"><h4>${p.n}</h4><p>$ ${p.p}</p><button class="btn-action" onclick="cart.push({pid:${i},...products[${i}]}); renderCart();">加入</button></div>`).join('');
    }

    function renderCart() {
        document.getElementById('cart-items').innerHTML = cart.map((c,i) => `<div>${c.n} - $${c.p} <span style="color:red; cursor:pointer;" onclick="cart.splice(${i},1); renderCart();">✕</span></div>`).join('');
        document.getElementById('cart-total').innerText = '$ ' + cart.reduce((a,b)=>a+b.p, 0);
    }

    function submitCartOrder() {
        const nick = document.getElementById('customer-nick').value;
        if(!nick || cart.length === 0) return alert("請輸入暱稱並選購商品！");
        db.ref('orders').push({ nick, items: cart, total: cart.reduce((a,b)=>a+b.p, 0), time: Date.now() });
        alert("訂單已提交！"); cart = []; renderCart();
    }

    function renderOrders() {
        const list = document.getElementById('admin-orders-list');
        list.innerHTML = Object.entries(orders).map(([k, o]) => `
            <div class="collapse-group">
                <div class="collapse-header"><b>👤 ${o.nick}</b> <span>$ ${o.total}</span></div>
                <div class="collapse-body">${o.items.map(it => `<div>${it.n}</div>`).join('')}</div>
            </div>
        `).join('');
    }

    function promptAdmin() { if(prompt("密碼:") === "3333") document.getElementById('front-hall').style.display = 'none'; }
    function exitAdmin() { document.getElementById('front-hall').style.display = 'flex'; }
    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    function switchTab(id, btn) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function openAddEventModal() { const name = prompt("場次名稱:"); if(name) { products.push({e:name, n:"範例", p:0}); db.ref('products').set(products); } }
</script>
</body>
</html>
