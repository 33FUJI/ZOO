<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>33日本動物園 穩定版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // 🚨 這是您的專屬資料庫，請勿刪除
        const firebaseConfig = {
            databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐾 33日本動物園 管理台</h1>
        <p id="status">正在同步連線中...</p>
    </div>

    <script>
        // 核心邏輯：確保資料抓取安全，不會因為空節點而報錯
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('status').innerText = "✅ 連線成功，商品清單已讀取。";
                console.log("商品資料:", data);
            } else {
                document.getElementById('status').innerText = "ℹ️ 目前尚無商品資料。";
            }
        }, (error) => {
            document.getElementById('status').innerText = "❌ 連線失敗，請檢查網路。";
            console.error(error);
        });
    </script>
</body>
</html>
