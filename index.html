<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    </head>
<body>

<div id="admin-purchase-stats-panel" class="panel-box" style="background: #FFFBEB; border: 1px solid #FDE68A; margin-bottom: 20px;">
    <h3 style="margin-top:0;">🛒 採購與庫存統計看板</h3>
    <div id="purchase-stats-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
        <p>統計運算中...</p>
    </div>
</div>

<script>
    // 園長您提供的核心邏輯 (完整保留)
    const firebaseConfig = { apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4", authDomain: "zoo-62638.firebaseapp.com", databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com", projectId: "zoo-62638" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let products = [], orders = [], cart = [], curQty = {}, curS = {}, currentFilterUser = 'all', currentMoneyFilter = 'all';

    // 園長您原本的監聽與運作邏輯 (完整保留)
    db.ref('products').on('value', snap => { products = snap.val() || []; });
    db.ref('orders').on('value', snap => { 
        orders = snap.val() || {}; 
        renderAdminOrders(); 
        updatePurchaseStats(); // 確保每次數據變更都同步刷新統計
    });

    // 園長您指示的統計與採購功能 (新增，保持結構完整)
    function updatePurchaseStats() {
        const grid = document.getElementById('purchase-stats-grid');
        if (!grid) return;
        
        let stats = {};
        Object.values(orders).forEach(o => {
            if (!o.items) return;
            o.items.forEach(it => {
                let key = `${it.n}_${it.sel || '一般'}`;
                if (!stats[key]) {
                    stats[key] = { name: it.n, spec: it.sel || '一般', total: 0 };
                }
                stats[key].total += 1;
            });
        });

        grid.innerHTML = Object.keys(stats).length === 0 ? '<p>目前無訂單資料。</p>' : Object.values(stats).map(s => `
            <div style="background:#FFF; padding:10px; border-radius:8px; border:1px solid #EAE2D1;">
                <div style="font-weight:bold; font-size:14px;">${s.name}</div>
                <div style="font-size:12px; color:#666;">規格: ${s.spec}</div>
                <div style="font-size:16px; color:var(--matcha); font-weight:bold; margin-top:5px;">
                    需採購: ${s.total} 個
                </div>
            </div>
        `).join('');
    }

    // 園長您原本的所有函式 (請依照順序貼回此處)
    // selectEvent, backToEventList, selSpec, updateQty, addToCart, renderCart, submitCartOrder, 
    // renderActiveEventsPage, renderAdminEvents, renderAdminProdsView, renderAdminOrders, 
    // renderMoneyRecords, markEventAllPaid, openAddEventModal, openAddProdModal, 
    // openProductEdit, deleteEntireEvent, closeModal, openPackAssistant, deleteSingleItem, 
    // mergeSelected, updateFilterButtons, filterOrderUser, filterMoneyStatus, copyOrderInfo, 
    // exportToCSV, runSearch, promptAdmin, exitAdmin...

    // 確保在 renderAdminOrders 的最後一行呼叫 updatePurchaseStats();
</script>
</body>
</html>
