<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>33日本動物園</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    /* 🍵 抹茶牛奶日系清爽色調調色盤 */
    body {
      background-color: #F4F7F4; /* 淡淡的清爽米綠底色 */
      color: #334155; /* 溫柔的深灰字 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .sj-card {
      background-color: #FFFFFF; /* 純白牛奶卡片 */
      border: 1px solid #E2E8F0;
      border-radius: 0.75rem;
      box-shadow: 0 4px 15px rgba(143, 168, 143, 0.1);
    }
    .sj-input {
      background-color: #FAFAFA;
      border: 1px solid #CBD5E1;
      color: #1E293B;
    }
    .sj-input:focus {
      border-color: #557A55; /* 抹茶綠焦點線 */
      outline: none;
      box-shadow: 0 0 0 3px rgba(85, 122, 85, 0.15);
    }
    .btn-primary {
      background-color: #557A55; /* 經典抹茶綠 */
      color: white;
      transition: all 0.2s;
    }
    .btn-primary:hover { 
      background-color: #436143; 
    }
    
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #F4F7F4; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="border-b border-slate-200 bg-white/90 backdrop-blur-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3 cursor-pointer" onclick="switchView('lobby')">
        <span class="text-xl">🍵</span>
        <h1 class="text-lg font-bold tracking-wider text-[#3D523D]">33 日本動物園連線 PRO</h1>
      </div>
      <nav class="flex space-x-1">
        <button onclick="switchView('lobby')" class="px-3 py-1.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition"><i class="fa-solid fa-cubes mr-1 text-[#557A55]"></i> 活動場次</button>
        <button onclick="switchView('orders-query')" class="px-3 py-1.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition"><i class="fa-solid fa-magnifying-glass mr-1 text-[#557A55]"></i> 訂單查詢</button>
        <button onclick="switchView('admin')" class="px-3 py-1.5 rounded-lg text-sm bg-[#EEF2EE] text-[#436143] border border-[#D0DDD0] hover:bg-[#DCE6DC] transition"><i class="fa-solid fa-user-shield mr-1"></i> 管理後台</button>
      </nav>
    </div>
  </header>

  <main class="flex-grow max-w-7xl w-full mx-auto p-4">
    
    <section id="view-lobby" class="space-y-6">
      <div id="active-events-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
      <div class="pt-6 border-t border-slate-200">
        <div class="text-xs text-slate-400 uppercase font-bold tracking-wider text-center mb-4">--- 已截止活動 ---</div>
        <div id="closed-events-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 opacity-60"></div>
      </div>
    </section>

    <section id="view-shop" class="hidden space-y-4">
      <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
        <button onclick="switchView('lobby')" class="text-slate-500 hover:text-slate-700 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i> 返回場次大廳</button>
        <h2 id="current-shop-title" class="text-base font-bold text-slate-700 text-center"></h2>
        <div class="w-20"></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
          <div id="shop-products-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
        <div class="lg:col-span-1">
          <div class="sj-card p-4 sticky top-20 space-y-4 border-t-4 border-t-[#557A55]">
            <h3 class="font-bold text-sm border-b border-slate-100 pb-2 text-slate-700 flex justify-between items-center">
              <span class="text-[#3D523D]">🛒 我的連線代購購物車</span>
              <button onclick="clearCart()" class="text-xs text-slate-400 hover:text-red-500">清空</button>
            </h3>
            <div id="cart-items" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <div class="border-t border-slate-100 pt-3 space-y-2">
              <div class="flex justify-between font-bold text-base text-slate-700">
                <span>總計金額:</span>
                <span id="cart-total" class="text-[#C87A28]">$0</span>
              </div>
              <div class="space-y-2 text-xs">
                <input type="text" id="buyer-line-id" placeholder="請輸入您的 LINE 暱稱 (對帳用)" class="w-full px-3 py-2 rounded-lg sj-input">
                <textarea id="buyer-note" placeholder="有任何規格或特殊需求請寫在這裡..." class="w-full px-3 py-2 rounded-lg sj-input h-16"></textarea>
              </div>
              <button onclick="submitOrder()" class="w-full btn-primary py-2.5 rounded-lg text-sm font-bold shadow-md tracking-wide"><i class="fa-solid fa-paper-plane mr-1"></i> 提交連線訂單</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="view-orders-query" class="hidden space-y-4 max-w-2xl mx-auto">
      <div class="sj-card p-6 space-y-4">
        <h2 class="text-base font-bold text-slate-700"><i class="fa-solid fa-magnifying-glass mr-1 text-[#557A55]"></i> 買家個人訂單查詢</h2>
        <div class="flex space-x-2">
          <input type="text" id="query-line-input" placeholder="請輸入您下單時填寫的 LINE 暱稱" class="flex-grow px-3 py-2 rounded-lg sj-input text-sm">
          <button onclick="queryBuyerOrders()" class="btn-primary px-6 py-2 rounded-lg font-bold text-sm shadow">搜尋</button>
        </div>
        <div id="query-results" class="space-y-3 pt-2"></div>
      </div>
    </section>

    <section id="view-admin" class="hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="sj-card p-4 flex items-center space-x-4">
          <div class="p-3 bg-[#EEF2EE] text-[#557A55] rounded-xl text-lg"><i class="fa-solid fa-wallet"></i></div>
          <div>
            <p class="text-[11px] text-slate-400 font-medium">總收取台幣金額</p>
            <h4 id="stat-total-revenue" class="text-xl font-bold text-slate-700">$0</h4>
          </div>
        </div>
        <div class="sj-card p-4 flex items-center space-x-4">
          <div class="p-3 bg-[#FDF6ED] text-[#C87A28] rounded-xl text-lg"><i class="fa-solid fa-sack-dollar"></i></div>
          <div>
            <p class="text-[11px] text-slate-400 font-medium">園長估計利潤 (台幣)</p>
            <h4 id="stat-total-profit" class="text-xl font-bold text-[#C87A28]">$0</h4>
          </div>
        </div>
        <div class="sj-card p-4 flex items-center space-x-4">
          <div class="p-3 bg-slate-100 text-slate-500 rounded-xl text-lg"><i class="fa-solid fa-receipt"></i></div>
          <div>
            <p class="text-[11px] text-slate-400 font-medium">累積訂單總筆數</p>
            <h4 id="stat-total-orders" class="text-xl font-bold text-slate-700">0 筆</h4>
          </div>
        </div>
      </div>

      <div class="border-b border-slate-200 flex space-x-4 text-sm">
        <button onclick="switchAdminTab('events')" id="tab-btn-events" class="pb-2 border-b-2 border-[#557A55] font-bold text-[#557A55] px-2">📅 活動場次與商品維護</button>
        <button onclick="switchAdminTab('orders')" id="tab-btn-orders" class="pb-2 border-b-2 border-transparent text-slate-400 hover:text-slate-600 px-2">📋 訂單紀錄與對帳助理</button>
      </div>

      <div id="admin-tab-events" class="space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="text-sm font-bold text-slate-500">活動場次主列表</h3>
          <button onclick="openEventModal()" class="px-4 py-2 bg-[#557A55] hover:bg-[#436143] text-white font-bold rounded-lg text-xs shadow"><i class="fa-solid fa-plus mr-1"></i> 一頁流極速配置全新場次</button>
        </div>
        <div class="sj-card overflow-x-auto">
          <table class="w-full text-left text-xs">
            <thead class="bg-[#F8FAF8] text-slate-500 font-medium border-b border-slate-200">
              <tr>
                <th class="p-3">活動名稱</th>
                <th class="p-3">計價換算匯率</th>
                <th class="p-3">商品總類數</th>
                <th class="p-3">前台狀態控制 (手動)</th>
                <th class="p-3 text-right">操作</th>
              </tr>
            </thead>
            <tbody id="admin-events-tbody" class="divide-y divide-slate-100 text-slate-600"></tbody>
          </table>
        </div>
      </div>

      <div id="admin-tab-orders" class="hidden space-y-4">
        <h3 class="text-sm font-bold text-slate-500">全球買家代購訂單紀錄</h3>
        <div id="admin-orders-container" class="space-y-3"></div>
      </div>
    </section>
  </main>

  <div id="event-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white border border-slate-200 rounded-2xl max-w-6xl w-full max-h-[92vh] flex flex-col shadow-2xl">
      <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-[#F8FAF8] rounded-t-2xl">
        <h3 id="modal-title" class="font-bold text-sm text-[#3D523D] flex items-center">
          <span class="mr-1">✨</span> 一頁流極速配置全新連線場次
        </h3>
        <button onclick="closeEventModal()" class="text-slate-400 hover:text-slate-600 text-lg"><i class="fa-solid fa-xmark"></i></button>
      </div>
      
      <div class="p-6 overflow-y-auto space-y-6 flex-grow text-xs">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-[#F4F7F4]/50 p-4 rounded-xl border border-[#E2E8F0]">
          <div>
            <label class="block text-slate-500 font-bold mb-1">場次名稱 <span class="text-red-500">*</span></label>
            <input type="text" id="modal-event-name" placeholder="例：2026-06 日本代購連線" class="w-full px-3 py-2 rounded-lg sj-input">
          </div>
          <div>
            <label class="block text-slate-500 font-bold mb-1">當次換算匯率 <span class="text-red-500">*</span></label>
            <input type="number" id="modal-event-rate" step="0.001" value="0.22" oninput="recalcAllPricesByRate()" class="w-full px-3 py-2 rounded-lg sj-input font-mono">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <h4 class="font-bold text-slate-600 flex items-center">
              <span class="text-base mr-1.5">📦</span> 場次內商品清單明細
            </h4>
            <button onclick="addModalProductRow()" class="px-3 py-1.5 bg-[#2D8A5E] hover:bg-[#226B46] text-white font-bold rounded text-[11px] flex items-center shadow-sm">
              <i class="fa-solid fa-plus mr-1"></i> 繼續新增下一筆商品 (Tab)
            </button>
          </div>
          
          <div class="overflow-x-auto border border-slate-100 rounded-lg">
            <table class="w-full text-left text-xs min-w-[900px]">
              <thead class="bg-[#F8FAF8] text-slate-500 border-b border-slate-200">
                <tr>
                  <th class="p-2.5 w-32">商品圖片網址</th>
                  <th class="p-2.5">商品品名 <span class="text-red-500">*</span></th>
                  <th class="p-2.5 w-44">規格 (逗號隔開)</th>
                  <th class="p-2.5 w-24">原價 (日幣)</th>
                  <th class="p-2.5 w-24">付代購 (日幣)</th>
                  <th class="p-2.5 w-28">台幣賣價 <span class="text-red-500">*</span></th>
                  <th class="p-2.5 w-32 text-center">庫存 (對應逗號)</th>
                  <th class="p-2.5 w-12 text-center">刪</th>
                </tr>
              </thead>
              <tbody id="modal-products-tbody" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
          </div>
        </div>
      </div>
      
      <div class="p-4 border-t border-slate-100 bg-[#F8FAF8] flex justify-end space-x-2 rounded-b-2xl">
        <button onclick="closeEventModal()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-5 text-xs font-medium">取消</button>
        <button onclick="saveEventAndProducts()" class="px-5 py-2 bg-[#2D8A5E] hover:bg-[#226B46] text-white font-bold rounded-lg text-xs shadow-md"><i class="fa-solid fa-floppy-disk mr-1"></i> 儲存並發布此場次</button>
      </div>
    </div>
  </div>

  <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400 mt-12">
    © 2026 33 日本動物園 ✨ 園長專屬手動開關連線大廳系統 (日系抹茶牛奶版)
  </footer>

  <script>
    // 📢 【請將此更換為您原本的 Firebase 密鑰設定】
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProducts = [];
    let allOrders = [];
    let eventStatusMap = {};
    let currentEventName = "";
    let cart = [];

    window.addEventListener('DOMContentLoaded', () => {
      initDatabaseListeners();
    });

    function initDatabaseListeners() {
      db.ref('event_status').on('value', snapshot => {
        eventStatusMap = snapshot.val() || {};
        renderLobbyAndEvents();
      });

      db.ref('products').on('value', snapshot => {
        const val = snapshot.val();
        allProducts = [];
        if(val) {
          Object.keys(val).forEach(k => { if(val[k]) { val[k].id = k; allProducts.push(val[k]); } });
        }
        renderLobbyAndEvents();
        if(currentEventName) renderShopProducts();
        updateAdminStats();
      });

      db.ref('orders').on('value', snapshot => {
        const val = snapshot.val();
        allOrders = [];
        if(val) {
          Object.keys(val).forEach(k => { if(val[k]) { val[k].key = k; allOrders.push(val[k]); } });
        }
        allOrders.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        renderAdminOrders();
        updateAdminStats();
      });
    }

    function switchView(viewName) {
      document.getElementById('view-lobby').classList.add('hidden');
      document.getElementById('view-shop').classList.add('hidden');
      document.getElementById('view-orders-query').classList.add('hidden');
      document.getElementById('view-admin').classList.add('hidden');
      if(viewName === 'lobby') { document.getElementById('view-lobby').classList.remove('hidden'); currentEventName = ""; }
      else if(viewName === 'shop') { document.getElementById('view-shop').classList.remove('hidden'); }
      else if(viewName === 'orders-query') { document.getElementById('view-orders-query').classList.remove('hidden'); }
      else if(viewName === 'admin') { document.getElementById('view-admin').classList.remove('hidden'); }
    }

    function switchAdminTab(tabName) {
      document.getElementById('admin-tab-events').classList.add('hidden');
      document.getElementById('admin-tab-orders').classList.add('hidden');
      document.getElementById('tab-btn-events').className = "pb-2 border-b-2 border-transparent text-slate-400 px-2";
      document.getElementById('tab-btn-orders').className = "pb-2 border-b-2 border-transparent text-slate-400 px-2";

      if(tabName === 'events') {
        document.getElementById('admin-tab-events').classList.remove('hidden');
        document.getElementById('tab-btn-events').className = "pb-2 border-b-2 border-[#557A55] font-bold text-[#557A55] px-2";
      } else if(tabName === 'orders') {
        document.getElementById('admin-tab-orders').classList.remove('hidden');
        document.getElementById('tab-btn-orders').className = "pb-2 border-b-2 border-[#557A55] font-bold text-[#557A55] px-2";
      }
    }

    // ================= 1. 前台連線大廳渲染 =================
    function renderLobbyAndEvents() {
      const eventNamesSet = new Set();
      allProducts.forEach(p => { if(p.e) eventNamesSet.add(p.e.trim()); });
      
      eventNamesSet.forEach(name => {
        if(!eventStatusMap[name]) eventStatusMap[name] = { isClosed: false, rate: 0.22 };
      });

      const activeGrid = document.getElementById('active-events-grid');
      const closedGrid = document.getElementById('closed-events-grid');
      activeGrid.innerHTML = "";
      closedGrid.innerHTML = "";

      const uniqueEventsArray = Array.from(eventNamesSet);
      if(uniqueEventsArray.length === 0) {
        activeGrid.innerHTML = `<p class="col-span-full text-center text-xs text-slate-400 py-12">目前尚無任何進行中的連線活動場次。</p>`;
      }

      uniqueEventsArray.forEach(eventName => {
        const status = eventStatusMap[eventName] || { isClosed: false, rate: 0.22 };
        const prodCount = allProducts.filter(p => p.e === eventName).length;

        const cardHtml = `
          <div class="sj-card p-5 bg-white flex flex-col justify-between border border-slate-200">
            <div>
              <div class="flex items-center justify-between mb-3">
                <span class="text-[10px] px-2 py-0.5 rounded font-bold ${status.isClosed ? 'bg-slate-100 text-slate-400':'bg-[#EEF2EE] text-[#436143] border border-[#D0DDD0]'}">
                  ${status.isClosed ? '已截止活動':'活動進行中'}
                </span>
                <span class="text-[11px] font-mono text-slate-400">JPY × ${status.rate || 0.22}</span>
              </div>
              <h4 class="font-bold text-slate-700 text-base mb-1">${eventName}</h4>
              <p class="text-xs text-slate-400 mb-4">共 ${prodCount} 項商品</p>
            </div>
            <button onclick="enterShop('${escapeHtml(eventName)}')" class="w-full py-2 rounded-lg text-xs font-bold transition ${status.isClosed ? 'bg-slate-100 text-slate-400':'bg-[#557A55] text-white hover:bg-[#436143] shadow-sm'}">
              ${status.isClosed ? '進入查看商品' : '選購商品 →'}
            </button>
          </div>
        `;

        if(status.isClosed) closedGrid.innerHTML += cardHtml;
        else activeGrid.innerHTML += cardHtml;
      });

      renderAdminEventsTable(uniqueEventsArray);
    }

    // ================= 2. 前台商品選購頁渲染 (自動隱藏斷貨規格) =================
    function enterShop(eventName) {
      currentEventName = eventName;
      document.getElementById('current-shop-title').innerText = eventName;
      cart = [];
      updateCartUi();
      renderShopProducts();
      switchView('shop');
    }

    function renderShopProducts() {
      const grid = document.getElementById('shop-products-grid');
      grid.innerHTML = "";

      const filtered = allProducts.filter(p => p.e === currentEventName);
      const isEventClosed = eventStatusMap[currentEventName]?.isClosed || false;

      if(filtered.length === 0) {
        grid.innerHTML = `<p class="col-span-full text-center text-xs text-slate-400 py-12">該場次目前尚無連線商品。</p>`;
        return;
      }

      filtered.forEach(p => {
        let optionsHtml = "";
        
        if(p.variants) {
          let availableCount = 0;
          Object.keys(p.variants).forEach(specKey => {
            const v = p.variants[specKey];
            // 🚨 核心邏輯：如果後台庫存小於或等於 0，直接跳過不顯示（完美的隱藏數字機制）
            if (v.stock !== undefined && v.stock !== "" && parseInt(v.stock) <= 0) {
              return; 
            }
            availableCount++;
            optionsHtml += `<option value="${escapeHtml(specKey)}">${escapeHtml(specKey)}</option>`;
          });
          
          if(availableCount === 0) {
            optionsHtml = `<option value="" disabled>已全數斷貨完售</option>`;
          }
        } else {
          optionsHtml = `<option value="預設規格">預設規格</option>`;
        }

        const imgUrl = p.img || 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=300&q=80';

        grid.innerHTML += `
          <div class="sj-card p-3 flex flex-col justify-between">
            <div>
              <div class="w-full h-44 bg-slate-100 rounded-lg overflow-hidden mb-2">
                <img src="${imgUrl}" class="w-full h-full object-cover">
              </div>
              <h4 class="font-bold text-slate-700 text-sm truncate">${p.n}</h4>
              <div class="flex justify-between items-center mt-1">
                <span class="text-base font-bold text-[#C87A28]">$${p.p} <span class="text-[10px] text-slate-400 font-normal">TWD</span></span>
              </div>
              <select id="spec-select-${p.id}" class="w-full mt-2 px-2 py-1.5 text-xs rounded sj-input">
                ${optionsHtml}
              </select>
            </div>
            <button onclick="addToCart('${p.id}')" ${isEventClosed ? 'disabled':''} class="w-full mt-3 py-2 rounded-lg font-bold text-xs transition ${isEventClosed ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'btn-primary shadow-sm'}">
              ${isEventClosed ? '連線已截止' : '<i class="fa-solid fa-plus mr-1"></i> 加入購物車'}
            </button>
          </div>
        `;
      });
    }

    function addToCart(pId) {
      const p = allProducts.find(prod => String(prod.id) === String(pId));
      if(!p) return;

      const specSelect = document.getElementById(`spec-select-${pId}`);
      if(specSelect.disabled || !specSelect.value || specSelect.value === "") { alert("此商品已無庫存可選購！"); return; }
      
      const selectedSpec = specSelect.value;

      const exist = cart.find(item => String(item.pId) === String(pId) && item.spec === selectedSpec);
      if(exist) {
        exist.qty += 1;
      } else {
        cart.push({ pId: p.id, name: p.n, price: parseInt(p.p || 0), spec: selectedSpec, qty: 1 });
      }
      updateCartUi();
    }

    function changeCartQty(idx, delta) {
      cart[idx].qty += delta;
      if(cart[idx].qty <= 0) cart.splice(idx, 1);
      updateCartUi();
    }
    function clearCart() { cart = []; updateCartUi(); }

    function updateCartUi() {
      const container = document.getElementById('cart-items');
      container.innerHTML = "";
      let total = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        container.innerHTML += `
          <div class="bg-slate-50 p-2 rounded-lg border border-slate-100 flex justify-between items-center text-xs">
            <div class="space-y-0.5 truncate pr-2">
              <p class="font-bold text-slate-700 truncate">${item.name}</p>
              <p class="text-[10px] text-slate-400">規格: ${item.spec}</p>
            </div>
            <div class="flex items-center space-x-2 flex-shrink-0">
              <button onclick="changeCartQty(${index}, -1)" class="w-5 h-5 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-600 font-bold">-</button>
              <span class="font-bold text-slate-700 w-4 text-center">${item.qty}</span>
              <button onclick="changeCartQty(${index}, 1)" class="w-5 h-5 bg-white border border-slate-200 hover:bg-slate-100 rounded text-slate-600 font-bold">+</button>
              <span class="font-mono text-[#C87A28] font-bold ml-1 w-12 text-right">$${itemTotal}</span>
            </div>
          </div>
        `;
      });
      if(cart.length === 0) container.innerHTML = `<p class="text-center text-slate-400 text-xs py-6">購物車空空如也。</p>`;
      document.getElementById('cart-total').innerText = `$${total}`;
    }

    function submitOrder() {
      if(cart.length === 0) { alert("您的購物車內尚無商品！"); return; }
      const lineId = document.getElementById('buyer-line-id').value.trim();
      if(!lineId) { alert("請輸入您的 LINE 暱稱以利對帳！"); return; }

      const updates = {};
      let totalAmount = 0;

      for(let item of cart) {
        totalAmount += item.price * item.qty;
        const originProd = allProducts.find(p => String(p.id) === String(item.pId));
        if(originProd && originProd.variants && originProd.variants[item.spec]) {
          const vObj = originProd.variants[item.spec];
          if(vObj.stock !== undefined && vObj.stock !== "") {
            const remainStock = parseInt(vObj.stock) - item.qty;
            if(remainStock < 0) {
              alert(`抱歉！商品【${item.name} - ${item.spec}】後台準備庫存不足，已被搶先下單完售。`);
              return;
            }
            updates[`products/${item.pId}/variants/${item.spec}/stock`] = remainStock;
          }
        }
      }

      const newOrder = {
        line: lineId,
        note: document.getElementById('buyer-note').value.trim(),
        eventName: currentEventName,
        total: totalAmount,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        items: cart.map(item => ({
          pId: item.pId, n: item.name, p: item.price, s: item.spec, q: item.qty
        }))
      };

      const oKey = db.ref('orders').push().key;
      updates[`orders/${oKey}`] = newOrder;

      db.ref().update(updates, (err) => {
        if(err) { alert("下單失敗，請重試。"); }
        else {
          alert(`🎉 連線下單成功！金額總計：$${totalAmount} 元。`);
          cart = [];
          document.getElementById('buyer-line-id').value = "";
          document.getElementById('buyer-note').value = "";
          updateCartUi();
          switchView('lobby');
        }
      });
    }

    // ================= 3. 買家獨立查單 =================
    function queryBuyerOrders() {
      const input = document.getElementById('query-line-input').value.trim();
      if(!input) { alert("請輸入 LINE 暱稱。"); return; }
      const resDiv = document.getElementById('query-results');
      resDiv.innerHTML = "";

      const filtered = allOrders.filter(o => o.line && o.line.toLowerCase() === input.toLowerCase());
      if(filtered.length === 0) { resDiv.innerHTML = `<p class="text-xs text-slate-400 py-2">查無相關連線訂單紀錄。</p>`; return; }

      filtered.forEach(o => {
        let itemsHtml = "";
        if(o.items) {
          o.items.forEach(it => { itemsHtml += `<div class="text-xs text-slate-600 flex justify-between py-0.5"><span>• ${it.n} (${it.s}) x ${it.q}</span><span>$${it.p * it.q}</span></div>`; });
        }
        resDiv.innerHTML += `
          <div class="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-2">
            <div class="flex justify-between text-[11px] text-slate-400">
              <span>連線場次: ${o.eventName || '歷史舊單'}</span>
              <span>${o.timestamp ? new Date(o.timestamp).toLocaleString():''}</span>
            </div>
            <div class="divide-y divide-slate-100">${itemsHtml}</div>
            <div class="flex justify-between items-center font-bold text-xs pt-2 border-t border-slate-200">
              <span class="text-slate-400 font-normal">備註: ${o.note || '無'}</span>
              <span class="text-[#C87A28]">總計: $${o.total}</span>
            </div>
          </div>
        `;
      });
    }

    // ================= 4. 管理後台數據看板運算 =================
    function updateAdminStats() {
      let totalRev = 0;
      let totalProfit = 0;

      allOrders.forEach(o => {
        totalRev += parseInt(o.total || 0);
        const rate = (eventStatusMap[o.eventName]?.rate) ? parseFloat(eventStatusMap[o.eventName].rate) : 0.22;

        if(o.items) {
          o.items.forEach(it => {
            const p = allProducts.find(prod => String(prod.id) === String(it.pId));
            if(p) {
              const uCost = parseFloat(p.jpy_cost || 0);
              const uFee = parseFloat(p.jpy_fee || 0);
              const unitProfit = (it.p || 0) - ((uCost + uFee) * rate);
              totalProfit += unitProfit * (it.q || 1);
            }
          });
        }
      });

      document.getElementById('stat-total-revenue').innerText = `$${totalRev.toLocaleString()}`;
      document.getElementById('stat-total-profit').innerText = `$${Math.round(totalProfit).toLocaleString()}`;
      document.getElementById('stat-total-orders').innerText = `${allOrders.length} 筆`;
    }

    function renderAdminEventsTable(uniqueEventsArray) {
      const tbody = document.getElementById('admin-events-tbody');
      tbody.innerHTML = "";

      uniqueEventsArray.forEach(eventName => {
        const status = eventStatusMap[eventName] || { isClosed: false, rate: 0.22 };
        const count = allProducts.filter(p => p.e === eventName).length;

        tbody.innerHTML += `
          <tr class="hover:bg-slate-50">
            <td class="p-3 font-bold text-slate-700">${eventName}</td>
            <td class="p-3 font-mono text-slate-500">${status.rate || 0.22}</td>
            <td class="p-3 text-slate-500">${count} 類商品</td>
            <td class="p-3">
              <button onclick="toggleEventStatus('${escapeHtml(eventName)}')" class="px-2.5 py-1 rounded text-[11px] font-bold transition ${status.isClosed ? 'bg-red-50 text-red-600 border border-red-200':'bg-[#EEF2EE] text-[#436143] border border-[#D0DDD0]'}">
                ${status.isClosed ? '🔒 已截止收單' : '🟢 連線接單中'}
              </button>
            </td>
            <td class="p-3 text-right space-x-3 text-xs">
              <button onclick="openEventModal('${escapeHtml(eventName)}')" class="text-[#557A55] hover:underline font-medium"><i class="fa-solid fa-pen"></i> 一頁流編輯</button>
              <button onclick="deleteEventGroup('${escapeHtml(eventName)}')" class="text-red-500 hover:underline font-medium"><i class="fa-solid fa-trash"></i> 刪除</button>
            </td>
          </tr>
        `;
      });
    }

    function toggleEventStatus(eventName) {
      const currentClosed = eventStatusMap[eventName]?.isClosed || false;
      db.ref(`event_status/${eventName}/isClosed`).set(!currentClosed);
    }

    function deleteEventGroup(eventName) {
      if(!confirm(`確定要下架刪除場次【${eventName}】嗎？`)) return;
      const updates = {};
      allProducts.forEach(p => { if(p.e === eventName) updates[`products/${p.id}`] = null; });
      updates[`event_status/${eventName}`] = null;
      db.ref().update(updates);
    }

    // ================= 5. 【大彈窗】編輯/新增一頁流處理 =================
    function openEventModal(editTargetEventName = "") {
      const modal = document.getElementById('event-modal');
      const tbody = document.getElementById('modal-products-tbody');
      tbody.innerHTML = "";

      if(editTargetEventName) {
        document.getElementById('modal-title').innerHTML = `📝 一頁流極速配置管理活動：<span class="text-[#557A55] ml-1">${editTargetEventName}</span>`;
        document.getElementById('modal-event-name').value = editTargetEventName;
        document.getElementById('modal-event-name').disabled = true;
        document.getElementById('modal-event-rate').value = eventStatusMap[editTargetEventName]?.rate || 0.22;

        const filtered = allProducts.filter(p => p.e === editTargetEventName);
        filtered.forEach(p => {
          let specString = "";
          let stockString = "";
          
          if(p.variants) {
            specString = Object.keys(p.variants).join(', ');
            stockString = Object.keys(p.variants).map(k => p.variants[k].stock ?? "不限").join(', ');
          } else {
            specString = "預設規格";
            stockString = "不限";
          }
          addModalProductRow({ img: p.img||'', n: p.n||'', s: specString, jpy_cost: p.jpy_cost||0, jpy_fee: p.jpy_fee||0, p: p.p||0, stock: stockString });
        });
      } else {
        document.getElementById('modal-title').innerHTML = `✨ 一頁流極速配置全新連線場次`;
        document.getElementById('modal-event-name').value = "";
        document.getElementById('modal-event-name').disabled = false;
        document.getElementById('modal-event-rate').value = "0.22";
        addModalProductRow();
      }
      modal.classList.remove('hidden');
    }

    function closeEventModal() { document.getElementById('event-modal').classList.add('hidden'); }

    function addModalProductRow(data = null) {
      const tbody = document.getElementById('modal-products-tbody');
      const rowId = 'row-' + Date.now() + Math.random().toString(36).substr(2, 4);

      const tr = document.createElement('tr');
      tr.id = rowId;
      tr.className = "hover:bg-slate-50";
      tr.innerHTML = `
        <td class="p-2"><input type="text" class="w-full px-2 py-1 rounded sj-input p-img text-[11px]" value="${escapeHtml(data?data.img:'')}" placeholder="圖片URL"></td>
        <td class="p-2"><input type="text" class="w-full px-2 py-1 rounded sj-input font-bold p-name" value="${escapeHtml(data?data.n:'')}" placeholder="品名(必填)"></td>
        <td class="p-2"><input type="text" class="w-full px-2 py-1 rounded sj-input p-spec text-[#557A55] font-medium" value="${escapeHtml(data?data.s:'')}" placeholder="M, L (留空為預設)"></td>
        <td class="p-2"><input type="number" oninput="calcRowTwdPrice('${rowId}')" class="w-full px-2 py-1 rounded sj-input text-right font-mono p-cost" value="${data?data.jpy_cost:''}" placeholder="0"></td>
        <td class="p-2"><input type="number" oninput="calcRowTwdPrice('${rowId}')" class="w-full px-2 py-1 rounded sj-input text-right font-mono p-fee" value="${data?data.jpy_fee:''}" placeholder="0"></td>
        <td class="p-2"><input type="number" class="w-full px-2 py-1 rounded bg-[#FCFDFB] text-[#C87A28] font-bold border border-slate-300 text-right p-price" value="${data?data.p:''}" placeholder="賣價"></td>
        <td class="p-2"><input type="text" class="w-full px-2 py-1 rounded sj-input text-center p-stock font-mono text-[#2D8A5E]" value="${data?data.stock:''}" placeholder="例: 2, 5, 1"></td>
        <td class="p-2 text-center"><button onclick="document.getElementById('${rowId}').remove()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></td>
      `;
      tbody.appendChild(tr);
    }

    function calcRowTwdPrice(rowId) {
      const row = document.getElementById(rowId);
      const rate = parseFloat(document.getElementById('modal-event-rate').value) || 0.22;
      const cost = parseFloat(row.querySelector('.p-cost').value) || 0;
      const fee = parseFloat(row.querySelector('.p-fee').value) || 0;
      const res = Math.round((cost + fee) * rate);
      row.querySelector('.p-price').value = res > 0 ? res : "";
    }

    function recalcAllPricesByRate() {
      const rows = document.querySelectorAll('#modal-products-tbody > tr');
      rows.forEach(row => calcRowTwdPrice(row.id));
    }

    // 🧠 核心升級：支援「單一複製」與「多規格一對一不同庫存」高智商配對儲存
    function saveEventAndProducts() {
      const eventName = document.getElementById('modal-event-name').value.trim();
      const rate = parseFloat(document.getElementById('modal-event-rate').value) || 0.22;
      if(!eventName) { alert("請輸入活動場次名稱！"); return; }

      const rows = document.querySelectorAll('#modal-products-tbody > tr');
      const finalProducts = [];

      for(let row of rows) {
        const n = row.querySelector('.p-name').value.trim();
        if(!n) continue; 

        const img = row.querySelector('.p-img').value.trim();
        const specRaw = row.querySelector('.p-spec').value.trim();
        const jpy_cost = parseFloat(row.querySelector('.p-cost').value) || 0;
        const jpy_fee = parseFloat(row.querySelector('.p-fee').value) || 0;
        const p = parseInt(row.querySelector('.p-price').value) || 0;
        const stockRaw = row.querySelector('.p-stock').value.trim();

        const variantsMap = {};
        
        // 切割規格陣列
        const specArray = specRaw ? specRaw.split(/[,，\s]+/).filter(Boolean) : ["預設規格"];
        // 切割庫存陣列
        const stockArray = stockRaw ? stockRaw.split(/[,，\s]+/).map(s => s.trim()) : [];

        specArray.forEach((specName, index) => {
          let currentStockVal = "";
          
          if (stockArray.length === 0) {
            // 情況 A：庫存沒填 -> 全部不限
            currentStockVal = "";
          } else if (stockArray.length === 1) {
            // 情況 B：庫存只填了一個（例：6）-> 全尺寸都配 6
            const singleStock = stockArray[0];
            currentStockVal = (singleStock === "" || singleStock === "不限") ? "" : (isNaN(parseInt(singleStock)) ? "" : parseInt(singleStock));
          } else {
            // 情況 C：庫存填了多個（例：2, 5, 1）-> 依照順序一對一配對
            const matchedStock = stockArray[index];
            if (matchedStock !== undefined && matchedStock !== "" && matchedStock !== "不限") {
              currentStockVal = isNaN(parseInt(matchedStock)) ? "" : parseInt(matchedStock);
            } else {
              currentStockVal = ""; // 超出位置或寫不限，就當作不限
            }
          }

          variantsMap[specName] = {
            stock: currentStockVal
          };
        });

        finalProducts.push({ e: eventName, n, img, jpy_cost, jpy_fee, p, variants: variantsMap });
      }

      const updates = {};
      allProducts.forEach(oldP => { if(oldP.e === eventName) updates[`products/${oldP.id}`] = null; });
      
      finalProducts.forEach(newP => {
        const newK = db.ref('products').push().key;
        updates[`products/${newK}`] = newP;
      });

      const isCurrentClosed = eventStatusMap[eventName]?.isClosed || false;
      updates[`event_status/${eventName}`] = { isClosed: isCurrentClosed, rate: rate };

      db.ref().update(updates, (err) => {
        if(err) { 
          console.error(err);
          alert("儲存失敗，請檢查資料或網路連線。"); 
        } else { 
          alert(`✨ 場次【${eventName}】多規格高智商庫存配置發布完成！`); 
          closeEventModal(); 
        }
      });
    }

    // ================= 6. 後台買家訂單對帳與渲染 =================
    function renderAdminOrders() {
      const container = document.getElementById('admin-orders-container');
      container.innerHTML = "";

      if(allOrders.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-slate-400 py-12">目前尚未有任何連線對帳單。</p>`;
        return;
      }

      allOrders.forEach(o => {
        let itemsListHtml = "";
        let calcOrderJpyCost = 0;
        let calcOrderJpyFee = 0;
        const rate = (eventStatusMap[o.eventName]?.rate) ? parseFloat(eventStatusMap[o.eventName].rate) : 0.22;

        if(o.items) {
          o.items.forEach(it => {
            const p = allProducts.find(prod => String(prod.id) === String(it.pId));
            if(p) {
              calcOrderJpyCost += parseFloat(p.jpy_cost || 0) * it.q;
              calcOrderJpyFee += parseFloat(p.jpy_fee || 0) * it.q;
            }
            itemsListHtml += `
              <div class="py-1 flex justify-between text-xs text-slate-600">
                <span>• ${it.n} <span class="text-[#557A55] font-bold">[${it.s}]</span> <span class="text-slate-400 font-bold">x ${it.q}</span></span>
                <span class="font-mono text-slate-700">$${it.p * it.q}</span>
              </div>
            `;
          });
        }

        const profitCalculated = Math.round((o.total || 0) - ((calcOrderJpyCost + calcOrderJpyFee) * rate));

        container.innerHTML += `
          <div class="sj-card p-4 bg-white border-l-4 border-l-[#557A55] space-y-2">
            <div class="flex justify-between items-start border-b border-slate-100 pb-2">
              <div>
                <h4 class="font-bold text-slate-700 text-xs flex items-center"><span class="bg-[#EEF2EE] text-[#436143] px-1.5 py-0.5 rounded text-[10px] font-mono mr-2">LINE</span> ${o.line}</h4>
                <p class="text-[10px] text-slate-400 mt-1">${o.timestamp?new Date(o.timestamp).toLocaleString():''} ｜ 場次：${o.eventName||'歷史舊單'}</p>
              </div>
              <span class="text-[11px] font-mono text-slate-400 bg-slate-50 px-2 py-0.5 rounded">匯率: ${rate}</span>
            </div>

            <div class="divide-y divide-slate-100">${itemsListHtml}</div>

            <div class="bg-[#F8FAF8] p-2 rounded-lg text-[11px] text-slate-500 grid grid-cols-2 md:grid-cols-4 gap-1 border border-slate-100">
              <div>🇯🇵 日幣原價: <span class="font-mono text-slate-600">¥${calcOrderJpyCost}</span></div>
              <div>🤝 付代購利潤: <span class="font-mono text-slate-600">¥${calcOrderJpyFee}</span></div>
              <div>📉 總採購成本: <span class="font-mono text-slate-600">$${Math.round((calcOrderJpyCost+calcOrderJpyFee)*rate)}</span></div>
              <div class="text-[#2D8A5E] font-bold">📈 園長淨利: <span>$${profitCalculated}</span></div>
            </div>

            <div class="flex justify-between items-center pt-2 mt-2 border-t border-slate-100 text-xs">
              <div class="text-slate-400 max-w-sm truncate">📌 備註：<span class="text-slate-600 font-medium">${o.note || '無'}</span></div>
              <div class="flex items-center space-x-2">
                <span class="font-bold text-slate-500">應收台幣: <span class="text-[#C87A28] text-sm">$${o.total}</span></span>
                <button onclick="deleteOrder('${o.key}')" class="text-slate-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>
          </div>
        `;
      });
    }

    function deleteOrder(oKey) { if(confirm("確定要刪除這筆買家訂單紀錄嗎？")) db.ref(`orders/${oKey}`).remove(); }

    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
