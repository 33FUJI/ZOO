<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --matcha: #606C38;
            --rice: #FEF9EF;
            --caramel: #BC6C25;
            --wood: #283618;
            --gray: #F4F1EA;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }

        /* 前台樣式區 */
        .hall { position: fixed; inset: 0; background: var(--rice); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .grid-hall { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .card-hall { background: #FFF; padding: 25px 10px; border-radius: 15px; border: 1px solid #EAE2D1; text-align: center; cursor: pointer; box-shadow: 0 4px 0 #EAE2D1; font-weight: bold; color: var(--matcha); font-size: 16px; }
        .card-hall:active { transform: translateY(2px); box-shadow: 0 2px 0 #EAE2D1; }

        .app-container { display: none; flex: 1; overflow: hidden; flex-direction: row; }
        .list-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--gray); -webkit-overflow-scrolling: touch; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .prod-card { background: #FFF; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-height: 280px; }
        .prod-name { font-size: 16px; font-weight: bold; min-height: 45px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; }
        .prod-price { color: var(--caramel); font-size: 18px; margin: 8px 0; font-weight: bold; text-align: center; }

        .cart-area { width: 360px; background: #FFF; border-left: 1px solid #DDD; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        .cart-bottom { padding: 15px; border-top: 1px solid #EEE; background: #FFF; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }

        .btn-add { background: var(--matcha); color: #FFF; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* 後台管理樣式 */
        #admin-panel { position: fixed; inset: 0; background: #F8F9FA; z-index: 4000; display: none; flex-direction: column; }
        .admin-header { background: var(--wood); color: #FFF; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .admin-nav { padding: 10px; background: #EEE; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #DDD; }
        .admin-order-card { background: #FFF; border: 1px solid #EEE; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        
        .multi-box { position: relative; background: #FFF; color: #333; padding: 8px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid #CCC; min-width: 130px; flex: 1; }
        .multi-content { display: none; position: absolute; top: 100%; left: 0; width: 220px; background: #FFF; border: 1px solid #CCC; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100; max-height: 400px; overflow-y: auto; padding: 10px; }
        .multi-content label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: normal; font-size: 13px; }

        .ship-toggle-area { background: #FDFDFD; padding: 10px; border: 1px dashed #DDD; border-radius: 8px; margin: 10px 0; }
        .ship-item-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 13px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .input-std { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #DDD; border-radius: 10px; font-size: 15px; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .cart-area { width: 100%; flex: 1.5; border-left: none; }
            .prod-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="hall-screen" class="hall">
    <h1 style="color:var(--matcha);">33 日本動物園</h1>
    <div id="hall-grid" class="grid-hall"></div>
    <button onclick="document.getElementById('search-modal').style.display='flex'" style="background:var(--caramel); color:#FFF; border:none; padding:15px 40px; border-radius:30px; margin-top:30px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
    <div onclick="adminLogin()" style="margin-top:50px; color:#CCC; cursor:pointer; font-size:11px;">管理登入</div>
</div>

<div class="app-container" id="main-app">
    <div class="list-area"><div id="prod-list" class="prod-grid"></div></div>
    <div class="cart-area">
        <div style="padding:15px; font-weight:bold; background:#FDFDFD; border-bottom:1px solid #EEE;">🛒 購物清單</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="cart-bottom">
            <p style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin:5px 0;">總計: <span style="color:var(--caramel);">$ <span id="cart-total">0</span></span></p>
            <input id="nick" class="input-std" placeholder="您的 LINE 暱稱">
            <button class="btn-add" style="width:100%; padding:16px; font-size:18px;" onclick="submitOrder()">確認提交訂單</button>
            <button onclick="backToHall()" style="width:100%; margin-top:10px; border:none; background:none; color:#999; font-size:13px;">← 返回目錄</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-header">
        <b onclick="location.reload()">工作台</b>
        <div style="display:flex; gap:8px; flex:1;">
            <div class="multi-box" onclick="toggleBox('evt-filter-content', event)">
                <span id="evt-filter-label">選擇場次 (多選)</span>
                <div id="evt-filter-content" class="multi-content" onclick="event.stopPropagation()"></div>
            </div>
            <div class="multi-box" onclick="toggleBox('nick-filter-content', event)">
                <span id="nick-filter-label">選擇客人 (多選)</span>
                <div id="nick-filter-content" class="multi-content" onclick="event.stopPropagation()"></div>
            </div>
        </div>
        <button onclick="document.getElementById('admin-panel').style.display='none'">關閉</button>
    </div>
    <div class="admin-nav">
        <button class="btn-add" onclick="adminTab='orders'; renderAdminOrders()">訂單管理</button>
        <button class="btn-add" style="background:#888;" onclick="adminTab='prods'; renderAdminProds()">商品維護</button>
    </div>
    <div id="admin-main" style="flex:1; overflow-y:auto; padding:15px; background:var(--gray);"></div>
</div>

<div id="search-modal" class="modal">
    <div class="modal-box">
        <h2 style="text-align:center;">個人訂單查詢</h2>
        <input id="search-nick" class="input-std" placeholder="您的 LINE 暱稱">
        <div id="search-results-area" style="max-height:400px; overflow-y:auto; margin-bottom:15px; border-top:1px solid #EEE;"></div>
        <button class="btn-add" style="width:100%; padding:15px;" onclick="performSearch()">開始查詢</button>
        <button onclick="document.getElementById('search-modal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#666;">關閉</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], orders = {}, cart = [], currentEvent = "", adminTab = 'orders';
    let selEvts = [], selNicks = [];

    db.ref('products').on('value', snap => { 
        products = snap.val() || []; 
        renderHall(); 
        renderEvtFilter();
    });
    db.ref('orders').on('value', snap => { 
        orders = snap.val() || {}; 
        renderNickFilter();
        if(document.getElementById('admin-panel').style.display === 'flex') refreshAdmin();
    });

    function toggleBox(id, e) {
        e.stopPropagation();
        const el = document.getElementById(id);
        const isShow = el.style.display === 'block';
        document.querySelectorAll('.multi-content').forEach(c => c.style.display = 'none');
        el.style.display = isShow ? 'none' : 'block';
    }
    document.onclick = () => document.querySelectorAll('.multi-content').forEach(c => c.style.display = 'none');

    function renderEvtFilter() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e).sort();
        document.getElementById('evt-filter-content').innerHTML = evts.map(e => `
            <label><input type="checkbox" class="evt-item-chk" value="${e}" onchange="onEvtChange()"> ${e}</label>
        `).join('');
    }

    function onEvtChange() {
        selEvts = Array.from(document.querySelectorAll('.evt-item-chk:checked')).map(el => el.value);
        document.getElementById('evt-filter-label').innerText = selEvts.length ? `已選場次(${selEvts.length})` : "選擇場次 (多選)";
        refreshAdmin();
    }

    function renderNickFilter() {
        const nicks = [...new Set(Object.values(orders).map(o => o.nick))].sort();
        document.getElementById('nick-filter-content').innerHTML = nicks.map(n => `
            <label><input type="checkbox" class="nick-item-chk" value="${n}" onchange="onNickChange()"> ${n}</label>
        `).join('');
    }

    function onNickChange() {
        selNicks = Array.from(document.querySelectorAll('.nick-item-chk:checked')).map(el => el.value);
        document.getElementById('nick-filter-label').innerText = selNicks.length ? `已選客人(${selNicks.length})` : "選擇客人 (多選)";
        refreshAdmin();
    }

    function refreshAdmin() { if(adminTab === 'orders') renderAdminOrders(); }

    function renderAdminOrders() {
        const main = document.getElementById('admin-main');
        let orderEntries = Object.entries(orders);
        if (selNicks.length > 0) orderEntries = orderEntries.filter(([k, o]) => selNicks.includes(o.nick));

        main.innerHTML = orderEntries.sort((a,b)=>a[1].time-b[1].time).map(([k, o]) => {
            const itemsHtml = (o.items || []).map((it, idx) => {
                const isMatchEvt = selEvts.length === 0 || selEvts.includes(it.e);
                return `
                    <div class="ship-item-row">
                        <input type="checkbox" class="ship-chk-${k}" value="${idx}" ${isMatchEvt ? 'checked' : ''}>
                        <span>[${it.e}] ${it.n}(${it.sel || '一般'})</span>
                    </div>
                `;
            }).join('');

            return `<div class="admin-order-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>👤 客人：${o.nick}</b>
                    <button onclick="if(confirm('整筆刪除？'))db.ref('orders/${k}').remove()" style="color:#CCC; background:none; border:none;">✕</button>
                </div>
                <div class="ship-toggle-area">${itemsHtml}</div>
                <button class="btn-add" style="width:100%; background:#4CAF50;" onclick="copyDetailedFinal('${k}')">📋 複製出貨明細</button>
            </div>`}).join('');
    }

    function copyDetailedFinal(k) {
        const o = orders[k];
        const checks = document.querySelectorAll(`.ship-chk-${k}`);
        let shipItems = [], waitItems = [];
        checks.forEach(chk => {
            const idx = parseInt(chk.value);
            if(chk.checked) shipItems.push(o.items[idx]);
            else waitItems.push(o.items[idx]);
        });
        const currentEvts = [...new Set(shipItems.map(it => it.e))].join('、');
        let txt = `🌟 【33日本動物園 - 出貨明細】 🌟\n\n👤 暱稱：${o.nick}\n📅 出貨場次：${currentEvts || '待核對'}\n\n📦 【本次預計寄出】：\n`;
        if(shipItems.length > 0) shipItems.forEach(it => txt += `[${it.e}] ${it.n}(${it.sel || '一般'})\n`);
        else txt += `(無)\n`;
        txt += `\n⏳ 【尚在等候中】：\n`;
        if(waitItems.length > 0) waitItems.forEach(it => txt += `[${it.e}] ${it.n}(${it.sel || '一般'})\n`);
        else txt += `(無)\n`;
        txt += `\n以上資訊請核對，如有誤請告知唷！謝謝您 🙏`;
        navigator.clipboard.writeText(txt).then(() => alert("✨ 出貨明細已複製！"));
    }

    function renderHall() {
        const evts = [...new Set(products.map(p => p.e))].filter(e => e && e.trim() !== "");
        document.getElementById('hall-grid').innerHTML = evts.map(e => `<div class="card-hall" onclick="openShop('${e}')">${e}</div>`).join('');
    }
    function openShop(e) {
        currentEvent = e; document.getElementById('hall-screen').style.display='none'; document.getElementById('main-app').style.display='flex';
        const list = products.filter(p => p.e === e);
        document.getElementById('prod-list').innerHTML = list.map(p => {
            const rid = products.indexOf(p);
            return `<div class="prod-card">
                <div class="prod-name">${p.n}</div><div class="prod-price">$${p.p}</div>
                <button class="btn-add" onclick="addToCart(${rid})">加入購物車</button>
            </div>`;
        }).join('');
    }
    function addToCart(rid) {
        cart.push({...products[rid], sel: "一般", pid: rid});
        renderCart();
    }
    function renderCart() {
        document.getElementById('cart-items').innerHTML = cart.map((it, i) => `
            <div style="padding:8px 0; border-bottom:1px solid #EEE; display:flex; justify-content:space-between;">
                <span>${it.n}</span><span onclick="cart.splice(${i},1);renderCart();">✕</span>
            </div>
        `).join('');
        document.getElementById('cart-total').innerText = cart.reduce((a,b)=>a+b.p,0);
    }
    function submitOrder() {
        const n = document.getElementById('nick').value.trim();
        if(!n || !cart.length) return alert("資料不全");
        db.ref('orders').push({ nick: n, items: cart, time: Date.now() }).then(() => { alert("送出成功"); location.reload(); });
    }
    function backToHall() { currentEvent = ""; document.getElementById('main-app').style.display='none'; document.getElementById('hall-screen').style.display='flex'; }
    function adminLogin() { if(prompt("密碼")==="1239") document.getElementById('admin-panel').style.display='flex'; }
    function performSearch() {
        const n = document.getElementById('search-nick').value.trim();
        const res = Object.values(orders).filter(o => o.nick === n);
        document.getElementById('search-results-area').innerHTML = res.map(o => `
            <div style="padding:10px; border-bottom:1px solid #EEE;">${o.items.map(it => `[${it.e}] ${it.n}`).join('<br>')}</div>
        `).join('') || "查無資料";
    }
</script>
</body>
</html>
