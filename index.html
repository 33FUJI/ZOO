<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>33日本動物園</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --matcha: #606C38; 
            --rice: #FEF9EF; 
            --caramel: #BC6C25; 
            --wood: #283618; 
            --gray: #F4F1EA; 
            --baby-blue: #E0F2FE;
            --profit-green: #2A9D8F;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--gray); overflow: hidden; color: var(--wood); }
        body { display: flex; flex-direction: column; }
        
        /* 頂部導覽列 */
        .top-nav { background: var(--rice); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EAE2D1; }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .brand-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: var(--matcha); display: flex; align-items: center; gap: 6px; }
        .tag-admin { background: var(--wood); color: #FFF; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .nav-tabs { display: flex; gap: 5px; }
        .nav-tab { background: transparent; border: none; color: #666; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .nav-tab.active { background: var(--matcha); color: #FFF; }
        .btn-logout { background: #FFF; border: 1px solid #DDD; color: #666; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }

        /* 主內容區 */
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .view-section { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .view-section.active { display: block; }
        
        /* 面板與區塊樣式 */
        .panel-box { background: #FFF; border-radius: 12px; border: 1px solid #EAE2D1; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .panel-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--wood); border-bottom: 1px solid #EAE2D1; padding-bottom: 10px; }
        
        /* 資料表格樣式 */
        .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; color: var(--wood); }
        .data-table th { color: var(--matcha); font-weight: bold; padding: 12px 8px; border-bottom: 1px solid #EAE2D1; background: var(--rice); }
        .data-table td { padding: 14px 8px; border-bottom: 1px solid #EAE2D1; vertical-align: middle; }
        
        /* 狀態標籤 */
        .status-badge { background: var(--baby-blue); color: #0369A1; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        
        /* 按鈕樣式 */
        .btn-sm { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; margin-left: 4px; }
        .btn-edit { background: #FFF; color: var(--caramel); border: 1px solid var(--caramel); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-del:hover { background: #EF4444; color: #FFF; }
        .btn-action { background: var(--matcha); color: #FFF; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; }
        .btn-excel { background: #4A90E2; color: #FFF; float: right; margin-bottom: 10px; }
        .btn-qty { width: 26px; height: 26px; border-radius: 4px; border: 1px solid #DDD; background: #FFF; cursor: pointer; font-weight: bold; }
        
        /* 提示 Banner */
        .summary-banner { background: var(--baby-blue); border: 1px solid #BAE6FD; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; color: #0369A1; font-weight: bold; }
        .order-filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { background: #FFF; border: 1px solid #DDD; color: #666; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: var(--matcha); color: #FFF; border-color: var(--matcha); }
        
        /* 摺疊選單與連線場次大卡片 */
        .collapse-group { background: #FFF; border-radius: 12px; border: 1px solid #EAE2D1; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .collapse-header { padding: 16px 20px; background: var(--rice); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .collapse-body { padding: 15px; display: block; background: #FFF; border-top: 1px solid #EAE2D1; }

        /* 前台大廳佈局 */
        .front-container { position: fixed; inset: 0; background: var(--gray); z-index: 3000; display: flex; flex-direction: column; }
        .front-main { display: flex; flex: 1; overflow: hidden; }
        .front-content { flex: 1; overflow-y: auto; padding: 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .event-card { background: #FFF; border: 1px solid #EAE2D1; border-radius: 16px; padding: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.04); transition: transform 0.2s; text-align: center; }
        .event-card:hover { transform: translateY(-3px); border-color: var(--matcha); }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .prod-card { background: #FFF; border: 1px solid #EAE2D1; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .cart-panel { width: 360px; background: #FFF; border-left: 1px solid #EAE2D1; padding: 20px; display: flex; flex-direction: column; }
        
        /* 彈出視窗 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; }
        .modal-box { background: var(--rice); border: 1px solid #EAE2D1; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; color: var(--wood); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .input-std { width: 100%; padding: 10px; margin: 8px 0; background: #FFF; border: 1px solid #DDD; border-radius: 6px; color: var(--wood); }

        /* 配貨對帳卡片風格 */
        .pack-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 15px; }
        .pack-user-card { background: #FFF; border: 1px solid #EAE2D1; border-radius: 8px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .pack-item-line { font-size: 12px; padding: 4px 0; border-bottom: 1px dashed #EEE; display: flex; justify-content: space-between; align-items: center; }
        .ship-toggle { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .ship-unpaid { background: #FEE2E2; color: #EF4444; }
        .ship-paid { background: #D1FAE5; color: #10B981; }
    </style>
</head>
<body>

<div id="front-hall" class="front-container">
    <div class="top-nav">
        <div class="nav-brand">
            <div class="brand-title">🌿 33 日本動物園 連線大廳</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button id="btn-back-to-events" onclick="backToEventList()" class="btn-logout" style="display:none; background:var(--rice); color:var(--matcha); border-color:var(--matcha);">⬅ 返回場次列表</button>
            <button onclick="document.getElementById('search-modal').style.display='flex'" class="btn-sm" style="padding:8px 16px; background:var(--caramel); color:#FFF; border:none; border-radius:20px; font-weight:bold; cursor:pointer;">🔍 查詢我的訂單</button>
            <button onclick="promptAdmin()" class="btn-logout">管理登入</button>
        </div>
    </div>
    
    <div class="front-main">
        <div class="front-content">
            <div id="front-event-layer">
                <h3 style="margin-top:0; color:var(--wood); margin-bottom:20px;">📌 請選擇您要參與的連線活動場次：</h3>
                <div id="front-event-grid" class="event-grid"></div>
            </div>
            
            <div id="front-prod-layer" style="display:none;">
                <h3 id="current-selected-event-title" style="margin-top:0; color:var(--matcha); margin-bottom:20px; border-left:4px solid var(--matcha); padding-left:10px;">場次商品明細</h3>
                <div id="front-prod-grid" class="prod-grid"></div>
            </div>
        </div>

        <div class="cart-panel">
            <h3 style="margin-top:0; color:var(--matcha); border-bottom:1px solid #EEE; padding-bottom:10px; display:flex; align-items:center; gap:6px;">🛒 購物車清單</h3>
            <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
            <div style="border-top:1px solid #EEE; padding-top:15px;">
                <p style="font-weight:bold; margin-bottom:12px;">總計金額: <span id="cart-total" style="color:var(--caramel); font-size:22px;">$ 0</span></p>
                <input id="customer-nick" class="input-std" placeholder="請輸入您的 LINE 暱稱">
                <button class="btn-action" style="width:100%; margin-top:10px; padding:14px; font-size:15px;" onclick="submitCartOrder()">確認提交訂單</button>
            </div>
        </div>
    </div>
</div>

<div class="top-nav">
    <div class="nav-brand">
        <div class="brand-title">🐾 33日本動物園</div>
        <div class="tag-admin">● 園長後台</div>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('tab-events', this)">活動場次</button>
        <button class="nav-tab" onclick="switchTab('tab-admin', this)">⚙ 管理後台</button>
        <button class="nav-tab" onclick="switchTab('tab-orders', this)">📋 訂單記錄</button>
        <button class="nav-tab" onclick="switchTab('tab-money', this)">💰 收款記錄</button>
    </div>
    <button class="btn-logout" onclick="exitAdmin()">登出大廳</button>
</div>

<div class="main-container">
    
    <div id="tab-events" class="view-section active">
        <div class="panel-box">
            <div class="panel-title">📌 進行中的連線活動場次</div>
            <div id="active-events-list" class="event-grid"></div>
        </div>
    </div>

    <div id="tab-admin" class="view-section">
        <div style="margin-bottom:20px;">
            <button class="btn-action" onclick="openAddEventModal()">＋ 建立新活動場次</button>
            <button class="btn-action" style="background:var(--caramel); margin-left:10px;" onclick="openAddProdModal()">＋ 上架全新商品卡片</button>
            <button class="btn-action" style="background:#E07A5F; margin-left:10px;" onclick="openPackAssistant()">📦 配貨助手與對帳小卡片</button>
        </div>
        
        <div class="panel-box">
            <div class="panel-title">📝 系統現有活動場次維護</div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>活動名稱</th>
                        <th>狀態</th>
                        <th>幣別 / 匯率</th>
                        <th>商品總數</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="admin-events-table"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-orders" class="view-section">
        <button class="btn-sm btn-excel" onclick="exportToCSV()">📤 匯出資料 (Excel)</button>
        <div style="margin-bottom:12px;"><button class="btn-action" style="padding:6px 15px; font-size:12px;" onclick="mergeSelected()">🔗 選取併單</button></div>
        <div class="order-filter-bar" id="order-user-filters">
            <button class="filter-btn active" onclick="filterOrderUser('all')">全部</button>
        </div>
        <div class="panel-box">
            <div class="panel-title">📋 買家訂單詳細明細核對統計 (可動態更改商品、規格與價格)</div>
            <div id="admin-orders-list"></div>
        </div>
    </div>

    <div id="tab-money" class="view-section">
        <div class="summary-banner" id="unpaid-summary-banner">
            未收款小計：0 筆 ｜ 合計金額：NT$ 0
        </div>
        <div class="order-filter-bar">
            <button class="filter-btn active" onclick="filterMoneyStatus('all', this)">全部記錄</button>
            <button class="filter-btn" onclick="filterMoneyStatus('unpaid', this)" style="color:red; font-weight:bold;">⚠️ 未收款</button>
            <button class="filter-btn" onclick="filterMoneyStatus('paid', this)" style="color:green; font-weight:bold;">✅ 已收款</button>
        </div>
        <div id="money-events-container"></div>
    </div>

</div>

<div id="edit-modal" class="modal"><div class="modal-box"><h3 id="modal-title">編輯項目</h3><div id="modal-body" style="max-height: 450px; overflow-y: auto;"></div><div style="display:flex; gap:10px; margin-top:20px;"><button class="btn-action" id="modal-save" style="flex:1;">儲存變更</button><button class="btn-action" style="flex:1; background:#999;" onclick="closeModal()">取消</button></div></div></div>
<div id="search-modal" class="modal"><div class="modal-box"><h2>🔍 個人訂單對帳查詢</h2><input id="search-nick" class="input-std" placeholder="請輸入您的 LINE 暱稱" oninput="runSearch()"><div id="search-results-area" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div><button onclick="document.getElementById('search-modal').style.display='none'" class="btn-action" style="width:100%; margin-top:15px; background:#999;">關閉視窗</button></div></div>

<script>
    // 您的 Firebase 連接配置
    const firebaseConfig = {
        apiKey: "AIzaSyD7KmXt_PjFzyYKz4tXGQAmz_wvmmSjAm4",
        authDomain: "zoo-62638.firebaseapp.com",
        databaseURL: "https://zoo-62638-default-rtdb.firebaseio.com",
        projectId: "zoo-62638",
        storageBucket: "zoo-62638.firebasestorage.app",
        messagingSenderId: "33012710753",
        appId: "1:33012710753:web:318636add1f5ac2f7b5920"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], orders = {}, cart = [], curS = {}, curQty = {};
    let currentFilterUser = 'all', currentMoneyFilter = 'all';
    let currentSelectedEventName = '';

    // 即時連動與同步監聽
    db.ref('products').on('value', snap => { 
        products = snap.val() || []; 
        renderFrontEvents(); 
        renderAdminEvents(); 
        renderActiveEventsPage(); 
        if(currentSelectedEventName) selectEvent(currentSelectedEventName); 
    });
    
    db.ref('orders').on('value', snap => { 
        orders = snap.val() || {}; 
        renderAdminOrders(); 
        renderMoneyRecords(); 
        updateFilterButtons(); 
    });

    function switchTab(tabId, btnEl) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(btnEl) btnEl.classList.add('active');
    }

    // 前台：第一層活動場次
    function renderFrontEvents() {
        const evts = [...new Set(products.map(p => p ? p.e : ''))].filter(e => e);
        const grid = document.getElementById('front-event-grid');
        if(evts.length === 0) {
            grid.innerHTML = `<p style="color:#999; text-align:center; grid-column:1/-1; padding:30px;">目前沒有任何連線活動場次唷！</p>`;
            return;
        }
        grid.innerHTML = evts.map(e => {
            const count = products.filter(p => p && p.e === e).length;
            return `<div class="event-card" onclick="selectEvent('${e}')">
                <div style="font-size:40px; margin-bottom:10px;">✨</div>
                <h3 style="margin:10px 0; color:var(--matcha); font-size:18px;">${e}</h3>
                <span class="status-badge">連線進行中</span>
                <p style="color:#888; font-size:12px; margin-top:15px;">內含 ${count} 項日本連線周邊</p>
            </div>`;
        }).join('');
    }

    // 前台：第二層場次內商品
    function selectEvent(evtName) {
        currentSelectedEventName = evtName;
        document.getElementById('front-event-layer').style.display = 'none';
        document.getElementById('front-prod-layer').style.display = 'block';
        document.getElementById('btn-back-to-events').style.display = 'block';
        document.getElementById('current-selected-event-title').innerText = `📌 當前活動場次：${evtName}`;

        const filteredProds = products.map((p, idx) => ({...p, originalIndex: idx})).filter(p => p && p.e === evtName);
        const grid = document.getElementById('front-prod-grid');
        
        if(filteredProds.length === 0) {
            grid.innerHTML = `<p style="color:#999; padding:20px; grid-column:1/-1; text-align:center;">此場次目前無上架商品卡片。</p>`;
            return;
        }

        grid.innerHTML = filteredProds.map(p => {
            const rid = p.originalIndex;
            if(!curQty[rid]) curQty[rid] = 1;
            const specs = (p.s||'').split(',').filter(v=>v.trim()).map(v=>`<button id="s-${rid}-${v}" onclick="selSpec(${rid},'${v}')" style="border:1px solid #DDD; margin:2px; font-size:11px; background:#FFF; color:var(--wood); border-radius:4px; padding:4px 8px; cursor:pointer;">${v}</button>`).join('');
            return `<div class="prod-card">
                <div>
                    <span style="color:var(--caramel); font-size:11px; font-weight:bold;">[${p.e}]</span>
                    <h4 style="margin:5px 0; color:var(--wood); font-size:15px; min-height:40px;">${p.n}</h4>
                    <p style="color:var(--caramel); font-weight:bold; margin:5px 0; font-size:16px;">$ ${p.p}</p>
                </div>
                <div class="spec-area" style="margin:10px 0; min-height:45px;">${specs}</div>
                <div>
                    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px;">
                        <button class="btn-qty" onclick="updateQty(${rid},-1)">-</button>
                        <span id="qty-val-${rid}" style="font-weight:bold; width:20px; text-align:center;">${curQty[rid]}</span>
                        <button class="btn-qty" onclick="updateQty(${rid},1)">+</button>
                    </div>
                    <button class="btn-action" style="width:100%; padding:8px; font-size:13px;" onclick="addToCart(${rid})">加入購物車</button>
                </div>
            </div>`;
        }).join('');
    }

    function backToEventList() { currentSelectedEventName = ''; document.getElementById('front-event-layer').style.display = 'block'; document.getElementById('front-prod-layer').style.display = 'none'; document.getElementById('btn-back-to-events').style.display = 'none'; }
    function selSpec(rid, v) { curS[rid] = v; document.querySelectorAll(`[id^="s-${rid}-"]`).forEach(b => b.style.background = '#FFF'); if(document.getElementById(`s-${rid}-${v}`)) document.getElementById(`s-${rid}-${v}`).style.background = '#EAE2D1'; }
    function updateQty(rid, d) { let v = (curQty[rid] || 1) + d; if(v < 1) v = 1; curQty[rid] = v; if(document.getElementById(`qty-val-${rid}`)) document.getElementById(`qty-val-${rid}`).innerText = v; }

    function addToCart(rid) {
        const p = products[rid]; if(!p) return;
        if((p.s||'').split(',').filter(x=>x.trim()).length > 0 && !curS[rid]) return alert("請先選擇商品規格唷！");
        for(let i=0; i<curQty[rid]; i++) cart.push({ ...p, sel: curS[rid]||"一般", pid: rid, isShipped: false });
        renderCart();
    }

    function renderCart() {
        let summ = {}; cart.forEach(it => { let k = `${it.pid}_${it.sel}`; summ[k] = (summ[k]||0)+1; });
        document.getElementById('cart-items').innerHTML = Object.keys(summ).map(k => {
            const [pid, sel] = k.split('_'); const name = products[pid] ? products[pid].n : "";
            return `<div style="padding:10px 0; border-bottom:1px solid #EEE; display:flex; justify-content:space-between; align-items:center; font-size:13px;"><span>${name} (${sel}) <b style="color:var(--matcha);">x${summ[k]}</b></span><span style="color:red; cursor:pointer; font-weight:bold; font-size:14px;" onclick="cart=cart.filter(x=>!(x.pid==${pid}&&x.sel=='${sel}')); renderCart();">✕</span></div>`
        }).join('');
        document.getElementById('cart-total').innerText = '$ ' + cart.reduce((a,b)=>a+b.p,0);
    }

    function submitCartOrder() {
        const nick = document.getElementById('customer-nick').value.trim(); if(!nick) return alert("請填寫您的 LINE 暱稱！");
        if(cart.length===0) return alert("購物車內目前沒有任何商品項目。");
        
        const newOrder = {
            nick: nick,
            items: cart,
            total: cart.reduce((a,b)=>a+b.p,0),
            time: Date.now(),
            isUnlocked: true,
            paid: false
        };

        db.ref('orders').push(newOrder).then(() => { 
            alert("🎉 訂單提交成功！資料已同步匯入更新至管理工作台。"); 
            cart=[]; 
            renderCart(); 
            document.getElementById('customer-nick').value=''; 
        });
    }

    // 後台：活動場次概覽
    function renderActiveEventsPage() {
        const evts = [...new Set(products.map(p => p ? p.e : ''))].filter(e => e);
        document.getElementById('active-events-list').innerHTML = evts.map(e => `
            <div class="event-card" style="cursor:default; padding:20px;">
                <b style="color:var(--wood); font-size:16px; display:block; margin-bottom:5px;">🟢 ${e}</b>
                <span class="status-badge" style="background:#F0FDF4; color:var(--matcha);">連線火熱進行中</span>
            </div>
        `).join('');
    }

    // 後台：維護與日幣換算台幣利潤精密面板
    function renderAdminEvents() {
        const evts = [...new Set(products.map(p => p ? p.e : ''))].filter(e => e);
        const tbody = document.getElementById('admin-events-table');
        if(evts.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">目前沒有建立任何場次。</td></tr>`;
            return;
        }
        tbody.innerHTML = evts.map(e => {
            const count = products.filter(p => p && p.e === e).length;
            return `<tr>
                <td style="font-weight:bold; color:var(--wood);">${e}</td>
                <td><span class="status-badge">進行中連線</span></td>
                <td style="color:var(--caramel); font-weight:bold;">JPY (日幣連線)</td>
                <td style="font-weight:bold; color:var(--matcha);">${count} 項商品</td>
                <td>
                    <button class="btn-sm btn-edit" onclick="renderAdminProdsView('${e}')">維護商品與利潤</button>
                    <button class="btn-sm btn-del" onclick="deleteEntireEvent('${e}')">刪除此場次</button>
                </td>
            </tr>`;
        }).join('');
    }

    function renderAdminProdsView(evtName) {
        switchTab('tab-admin');
        const tbody = document.getElementById('admin-events-table');
        let html = `<tr><td colspan="5" style="background:#FFF; padding:15px;"><b style="color:var(--matcha);">[${evtName}] 商品細節與私密利潤對帳表（僅限後台可見）：</b><br><br>`;
        
        products.forEach((p, i) => {
            if(p && p.e === evtName) {
                const jpOriginal = p.fp || 0;     
                const jpCost = p.cp || 0;         
                const currentRate = p.rate || 0.22; 
                const costTWD = Math.round(jpCost * currentRate);
                const profitTWD = p.p - costTWD;
                
                html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #EEE; font-size:13px;">
                    <div>
                        <strong>${p.n}</strong> (${p.s||'無規格'}) <br>
                        <span style="color:#666; font-size:12px;">
                            日幣原價: ¥${jpOriginal} | 代購購入價: ¥${jpCost} (折合台幣約 $${costTWD}) | 賣出價格: <b style="color:var(--caramel);">NT$ ${p.p}</b>
                        </span>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="background:#E6F4EA; color:var(--profit-green); padding:2px 8px; border-radius:4px; font-weight:bold; font-size:12px;">
                            預估利潤: +NT$ ${profitTWD}
                        </span>
                        <button class="btn-sm btn-edit" onclick="openProductEdit(${i})">修改</button>
                        <button class="btn-sm btn-del" onclick="if(confirm('確定下架商品嗎？')){let nP=[...products]; nP.splice(${i},1); db.ref('products').set(nP).then(()=>renderAdminEvents());}">下架</button>
                    </div>
                </div>`;
            }
        });
        html += `<br><button class="btn-action" style="font-size:12px; padding:6px 12px; background:#666;" onclick="renderAdminEvents()">返回場次列表</button></td></tr>`;
        tbody.innerHTML = html;
    }

    // 後台：分頁 3 訂單明細直接展開查閱 (增加動態變更單一商品名稱、規格、定價以及全局出貨勾選)
    function renderAdminOrders() {
        const main = document.getElementById('admin-orders-list');
        let filteredOrders = Object.entries(orders);
        if(currentFilterUser !== 'all') filteredOrders = filteredOrders.filter(([k, o]) => o && o.nick === currentFilterUser);

        let listHtml = '';
        filteredOrders.sort((a,b)=>b[1].time - a[1].time).forEach(([k, o]) => {
            if(!o || !o.items) return;
            
            const itemsHtml = o.items.map((it, idx) => {
                const isShipped = it.isShipped || false;
                return `
                <div style="font-size:13px; padding:10px 0; border-bottom:1px solid #F1EDE4; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 8px;">
                    <div style="flex: 1; min-width: 200px;">
                        <b style="color:var(--caramel);">[${it.e}]</b> ${it.n} 
                        <span style="background:var(--gray); padding:2px 6px; border-radius:4px; font-size:11px; margin-left:5px;">規格: ${it.sel}</span>
                        <span style="margin-left:8px; font-size:11px; font-weight:bold; padding:2px 6px; border-radius:4px; ${isShipped ? 'background:#D1FAE5; color:#10B981;' : 'background:#FEE2E2; color:#EF4444;'}">
                            ${isShipped ? '已出貨' : '未出貨'}
                        </span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:bold; color:var(--wood); margin-right:10px;">$ ${it.p}</span>
                        <button onclick="openModifyOrderItemModal('${k}', ${idx}); event.stopPropagation();" class="btn-sm btn-edit" style="padding:4px 8px;">✏️ 修改商品/價格</button>
                        <button onclick="toggleItemShipStatus('${k}', ${idx}); event.stopPropagation();" class="btn-sm" style="padding:4px 8px; background:#FFF; color:var(--matcha); border:1px solid var(--matcha);">🚚 切換出貨</button>
                        <button onclick="deleteSingleItem('${k}', ${idx}); event.stopPropagation();" style="color:#EF4444; background:none; border:none; font-size:14px; cursor:pointer; font-weight:bold;">✕ 刪除</button>
                    </div>
                </div>`;
            }).join('');

            listHtml += `
                <div class="collapse-group" style="border-left:5px solid var(--matcha);">
                    <div class="collapse-header" onclick="copyOrderInfo('${o.nick}')" style="background: var(--rice);">
                        <div>
                            <input type="checkbox" class="merge-check" value="${k}" data-nick="${o.nick}" onclick="event.stopPropagation()">
                            <b style="color:var(--wood); margin-left:8px; font-size:15px;">👤 買家：${o.nick}</b>
                            <span style="margin-left:12px; font-size:11px; background:#DDD; padding:2px 6px; border-radius:4px;">${new Date(o.time).toLocaleString()}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span style="font-size:15px; font-weight:bold; color:var(--caramel);">總計金額：$ ${o.total}</span>
                            <button onclick="if(confirm('確定要刪除整筆訂單嗎？'))db.ref('orders/${k}').remove(); event.stopPropagation();" class="btn-sm btn-del" style="padding:4px 8px;">🗑️ 刪整單</button>
                        </div>
                    </div>
                    <div class="collapse-body" style="background:#FFF; padding:15px;">
                        <div style="font-weight:bold; color:var(--matcha); margin-bottom:8px; font-size:12px;">📋 購買商品清單明細：</div>
                        ${itemsHtml}
                        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
                            <label style="cursor:pointer; font-size:12px; color:#555;"><input type="checkbox" ${o.isUnlocked?'checked':''} onchange="db.ref('orders/${k}').update({isUnlocked:this.checked})"> 開放前台自助對帳查詢</label>
                            <span style="font-size:12px; color:#999;">💡 點擊大標題欄位可快速複製 LINE 對帳文字</span>
                        </div>
                    </div>
                </div>`;
        });
        main.innerHTML = listHtml || `<p style="color:#999; text-align:center; padding:30px;">目前沒有任何買家訂單紀錄。</p>`;
    }

    // 變更個別買家訂單內的商品項目、規格、定價
    function openModifyOrderItemModal(orderKey, itemIdx) {
        const o = orders[orderKey]; if(!o || !o.items || !o.items[itemIdx]) return;
        const it = o.items[itemIdx];

        document.getElementById('modal-title').innerText = `✏️ 修改買家 [${o.nick}] 的商品項目`;
        document.getElementById('modal-body').innerHTML = `
            場次標籤：<input id="mod-it-e" class="input-std" value="${it.e||''}">
            商品名稱：<input id="mod-it-n" class="input-std" value="${it.n||''}">
            商品規格：<input id="mod-it-sel" class="input-std" value="${it.sel||''}">
            成交價格 (台幣)：<input id="mod-it-p" type="number" class="input-std" value="${it.p||0}">
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            let updatedItems = [...o.items];
            updatedItems[itemIdx] = {
                ...updatedItems[itemIdx],
                e: document.getElementById('mod-it-e').value.trim(),
                n: document.getElementById('mod-it-n').value.trim(),
                sel: document.getElementById('mod-it-sel').value.trim(),
                p: parseInt(document.getElementById('mod-it-p').value) || 0
            };

            db.ref(`orders/${orderKey}`).update({
                items: updatedItems,
                total: updatedItems.reduce((a, b) => a + b.p, 0)
            }).then(() => {
                closeModal();
                alert("商品內容與價格已同步更新完成！");
            });
        };
    }

    // 切換單一商品的配貨出貨狀態
    function toggleItemShipStatus(orderKey, itemIdx) {
        let o = orders[orderKey]; if(!o || !o.items || !o.items[itemIdx]) return;
        let updatedItems = [...o.items];
        updatedItems[itemIdx].isShipped = !updatedItems[itemIdx].isShipped;
        db.ref(`orders/${orderKey}`).update({ items: updatedItems });
    }

    // 全新精密修復與升級：配貨助手面板＋買家出貨對帳小卡片
    function openPackAssistant() {
        let summary = {};
        let userCards = {};

        Object.entries(orders).forEach(([orderKey, o]) => {
            if(!o || !o.items) return;
            if(!userCards[o.nick]) {
                userCards[o.nick] = { key: orderKey, nick: o.nick, list: [] };
            }
            o.items.forEach((it, idx) => {
                let k = `[${it.e}] ${it.n} (規格: ${it.sel})`;
                summary[k] = (summary[k] || 0) + 1;
                userCards[o.nick].list.push({ ...it, originalIdx: idx, orderKey: orderKey });
            });
        });

        // 1. 採購配貨彙整區
        let htmlBlock = `<h4 style="color:var(--matcha); border-left:4px solid var(--matcha); padding-left:8px; margin-bottom:10px;">📊 總商品採購採買統計清單</h4>`;
        htmlBlock += '<div style="background:#FFF; padding:12px; border-radius:8px; border:1px solid #EAE2D1; max-height:200px; overflow-y:auto; margin-bottom:20px;">';
        if(Object.keys(summary).length === 0) {
            htmlBlock += '<p style="color:#999; font-size:13px; text-align:center;">目前無任何配貨物資數據。</p>';
        } else {
            Object.keys(summary).sort().forEach(k => {
                htmlBlock += `<div style="padding:6px 0; border-bottom:1px solid #EEE; font-size:13px; display:flex; justify-content:space-between;"><span>📦 ${k}</span><b style="color:var(--caramel);">總量 × ${summary[k]}</b></div>`;
            });
        }
        htmlBlock += '</div>';

        // 2. 個人對帳與出貨狀態小卡片區
        htmlBlock += `<h4 style="color:var(--matcha); border-left:4px solid var(--matcha); padding-left:8px; margin-bottom:5px;">🎴 買家專屬配貨出貨對帳小卡片</h4>`;
        htmlBlock += `<p style="font-size:11px; color:#777; margin:0 0 10px 0;">園長可以直接在此處一鍵點擊切換各買家物資的【出貨狀態】：</p>`;
        htmlBlock += '<div class="pack-card-grid">';

        if(Object.keys(userCards).length === 0) {
            htmlBlock += '<p style="color:#999; font-size:13px; grid-column:1/-1; text-align:center;">尚無買家訂單小卡片。</p>';
        } else {
            Object.values(userCards).forEach(uc => {
                let linesHtml = uc.list.map(it => {
                    const statusText = it.isShipped ? "已出貨" : "未出貨";
                    const btnClass = it.isShipped ? "ship-paid" : "ship-unpaid";
                    return `
                    <div class="pack-item-line">
                        <span>🏷️ ${it.n} (${it.sel})</span>
                        <button class="ship-toggle ${btnClass}" onclick="toggleAssistantShipStatus('${uc.orderKey}', ${it.originalIdx})">
                            ${statusText}
                        </button>
                    </div>`;
                }).join('');

                htmlBlock += `
                <div class="pack-user-card">
                    <div style="font-weight:bold; color:var(--wood); font-size:14px; border-bottom:1px solid #EAE2D1; padding-bottom:6px; margin-bottom:8px; display:flex; justify-content:space-between;">
                        <span>👤 ${uc.nick}</span>
                        <span style="font-size:11px; color:var(--caramel);">共 ${uc.list.length} 件</span>
                    </div>
                    <div>${linesHtml}</div>
                </div>`;
            });
        }
        htmlBlock += '</div>';

        document.getElementById('modal-title').innerText = "📦 園長專用配貨助手工作台";
        document.getElementById('modal-body').innerHTML = htmlBlock;
        document.getElementById('edit-modal').style.display = 'flex';
        
        // 變更儲存按鈕為關閉
        document.getElementById('modal-save').innerText = "關閉助手";
        document.getElementById('modal-save').onclick = () => closeModal();
    }

    // 供配貨助手卡片內專用的無刷新非同步狀態切換
    function toggleAssistantShipStatus(orderKey, itemIdx) {
        let o = orders[orderKey]; if(!o || !o.items || !o.items[itemIdx]) return;
        let updatedItems = [...o.items];
        updatedItems[itemIdx].isShipped = !updatedItems[itemIdx].isShipped;
        db.ref(`orders/${orderKey}`).update({ items: updatedItems }).then(() => {
            // 即時動態重配對帳面板，防止畫面閃爍
            openPackAssistant();
        });
    }

    // 後台：分頁 4 收款對帳
    function renderMoneyRecords() {
        const container = document.getElementById('money-events-container');
        container.innerHTML = '';
        let unpaidCount = 0; let unpaidSum = 0; let groupedByEvent = {};

        Object.entries(orders).forEach(([k, o]) => {
            if(!o || !o.items || o.items.length === 0) return;
            if(!o.paid) { unpaidCount++; unpaidSum += o.total; }
            if(currentMoneyFilter === 'unpaid' && o.paid) return;
            if(currentMoneyFilter === 'paid' && !o.paid) return;

            const evtName = o.items[0].e || "基本常規連線";
            if(!groupedByEvent[evtName]) groupedByEvent[evtName] = [];
            groupedByEvent[evtName].push({ key: k, order: o });
        });

        document.getElementById('unpaid-summary-banner').innerText = `💰 未收款小計金額：${unpaidCount} 筆 ｜ 全局合計未收：NT$ ${unpaidSum.toLocaleString()}`;

        if(Object.keys(groupedByEvent).length === 0) {
            container.innerHTML = `<p style="color:#999; text-align:center; padding:20px;">無任何對應條件的帳務明細。</p>`;
            return;
        }

        for(let evtName in groupedByEvent) {
            const list = groupedByEvent[evtName];
            const rowsHtml = list.map(item => {
                return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #EEE;">
                    <div>
                        <div style="font-weight:bold; color:var(--wood);">${item.order.nick}</div>
                        <div style="color:#888; font-size:11px; margin-top:2px;">${new Date(item.order.time).toLocaleDateString()}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span style="font-weight:bold; color:var(--caramel);">$ ${item.order.total}</span>
                        <button class="btn-qty" style="width:75px; height:28px; border-radius:6px; font-size:12px; border:1px solid ${item.order.paid?'var(--matcha)':'#CCC'}; background:${item.order.paid?'#F0FDF4':'#FFF'}; color:${item.order.paid?'var(--matcha)':'#666'};" onclick="db.ref('orders/${item.key}').update({paid:${!item.order.paid}})">
                            ${item.order.paid ? '已收款' : '未收款'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML += `
                <div class="panel-box" style="margin-bottom:15px;">
                    <div class="panel-title">
                        <span>📌 場次：${evtName} <small style="color:#888; font-weight:normal; margin-left:10px;">共 ${list.length} 筆</small></span>
                        <button class="btn-action" style="padding:4px 10px; font-size:11px;" onclick="markEventAllPaid('${evtName}')">本區全清已收</button>
                    </div>
                    <div>${rowsHtml}</div>
                </div>`;
        }
    }

    function markEventAllPaid(evtName) {
        if(confirm(`確定要將 [${evtName}] 連線場次下的所有單據變更為已收款嗎？`)) {
            Object.entries(orders).forEach(([k, o]) => {
                if(o && o.items && o.items[0].e === evtName) db.ref(`orders/${k}`).update({ paid: true });
            });
        }
    }

    // 建立活動場次
    function openAddEventModal() {
        document.getElementById('modal-title').innerText = "建立全新活動連線場次";
        document.getElementById('modal-body').innerHTML = `場次名稱：<input id="new-evt-name" class="input-std" placeholder="例如: 日本超市連線">`;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const name = document.getElementById('new-evt-name').value.trim();
            if(!name) return alert("請輸入場次名稱唷！");
            let nP = [...products]; 
            nP.push({ e: name, n: "【活動場次初始化卡片】", p: 0, s: "一般", fp: 0, cp: 0, rate: 0.22 });
            db.ref('products').set(nP).then(() => { closeModal(); renderAdminEvents(); });
        };
    }

    // 上架全新商品卡片
    function openAddProdModal() {
        const evts = [...new Set(products.map(p => p ? p.e : ''))].filter(e => e);
        if(evts.length === 0) return alert("請先建立活動場次才能上架商品唷！");
        
        document.getElementById('modal-title').innerText = "上架全新商品周邊卡片";
        document.getElementById('modal-body').innerHTML = `
            所屬活動場次：<select id="p-evt" class="input-std">${evts.map(e=>`<option value="${e}">${e}</option>`).join('')}</select>
            商品名稱：<input id="p-name" class="input-std" placeholder="請輸入周邊名稱">
            台幣定價：<input id="p-price" type="number" class="input-std" placeholder="請輸入台幣賣出金額">
            商品規格：<input id="p-spec" class="input-std" placeholder="規格請用逗號隔開，例如: 紅色,藍色,大號">
            日幣原價 (JPY)：<input id="p-fp" type="number" class="input-std" value="0">
            日幣成本價 (JPY)：<input id="p-cp" type="number" class="input-std" value="0">
            自訂適用匯率：<input id="p-rate" type="number" step="0.0001" class="input-std" value="0.22">
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            const e = document.getElementById('p-evt').value;
            const n = document.getElementById('p-name').value.trim();
            const p = parseInt(document.getElementById('p-price').value) || 0;
            const s = document.getElementById('p-spec').value.trim();
            const fp = parseInt(document.getElementById('p-fp').value) || 0;
            const cp = parseInt(document.getElementById('p-cp').value) || 0;
            const rate = parseFloat(document.getElementById('p-rate').value) || 0.22;

            if(!n) return alert("請填寫商品名稱！");
            let nP = [...products];
            nP.push({ e, n, p, s, fp, cp, rate });
            db.ref('products').set(nP).then(() => { closeModal(); alert("上架成功！"); });
        };
    }

    // 編輯後台商品庫存基本設定與私密利潤
    function openProductEdit(index) {
        const p = products[index];
        document.getElementById('modal-title').innerText = "修改商品規格與私密成本";
        document.getElementById('modal-body').innerHTML = `
            商品名稱：<input id="edit-p-name" class="input-std" value="${p.n}">
            台幣售價：<input id="edit-p-price" type="number" class="input-std" value="${p.p}">
            規格選項：<input id="edit-p-spec" class="input-std" value="${p.s||''}">
            日幣原價：<input id="edit-p-fp" type="number" class="input-std" value="${p.fp||0}">
            日幣成本：<input id="edit-p-cp" type="number" class="input-std" value="${p.cp||0}">
            適用匯率：<input id="edit-p-rate" type="number" step="0.0001" class="input-std" value="${p.rate||0.22}">
        `;
        document.getElementById('edit-modal').style.display = 'flex';
        document.getElementById('modal-save').onclick = () => {
            let nP = [...products];
            nP[index] = {
                ...nP[index],
                n: document.getElementById('edit-p-name').value.trim(),
                p: parseInt(document.getElementById('edit-p-price').value) || 0,
                s: document.getElementById('edit-p-spec').value.trim(),
                fp: parseInt(document.getElementById('edit-p-fp').value) || 0,
                cp: parseInt(document.getElementById('edit-p-cp').value) || 0,
                rate: parseFloat(document.getElementById('edit-p-rate').value) || 0.22
            };
            db.ref('products').set(nP).then(() => { closeModal(); renderAdminEvents(); });
        };
    }

    function deleteEntireEvent(evtName) {
        if(confirm(`⚠️ 園長確定要刪除整個【${evtName}】場次與其下所有商品嗎？此動作無法復原。`)) {
            let nP = products.filter(p => p && p.e !== evtName);
            db.ref('products').set(nP);
        }
    }

    function deleteSingleItem(orderKey, itemIdx) {
        let o = orders[orderKey]; if(!o || !o.items) return;
        o.items.splice(itemIdx, 1);
        if(o.items.length === 0) {
            db.ref(`orders/${orderKey}`).remove();
        } else {
            o.total = o.items.reduce((sum, item) => sum + item.p, 0);
            db.ref(`orders/${orderKey}`).set(o);
        }
    }

    // 選取併單
    function mergeSelected() {
        let checks = document.querySelectorAll('.merge-check:checked');
        if(checks.length < 2) return alert("請至少勾選兩筆以上的訂單進行合併！");
        
        let targetNick = checks[0].getAttribute('data-nick');
        let keysToMerge = [];
        let combinedItems = [];

        for(let c of checks) {
            if(c.getAttribute('data-nick') !== targetNick) {
                return alert("錯誤：合併訂單的買家 LINE 暱稱必須完全一致！");
            }
            keysToMerge.push(c.value);
            if(orders[c.value] && orders[c.value].items) {
                combinedItems = combinedItems.concat(orders[c.value].items);
            }
        }

        if(confirm(`確定要把買家 [${targetNick}] 的 ${keysToMerge.length} 筆訂單合併為一筆大訂單嗎？`)) {
            db.ref('orders/' + keysToMerge[0]).update({
                items: combinedItems,
                total: combinedItems.reduce((a, b) => a + b.p, 0),
                time: Date.now()
            }).then(() => {
                for(let i = 1; i < keysToMerge.length; i++) {
                    db.ref('orders/' + keysToMerge[i]).remove();
                }
                alert("🔗 訂單併單成功！已自動重整統計數據。");
            });
        }
    }

    // 複製 LINE 對帳專用文字
    function copyOrderInfo(nick) {
        let userOrders = Object.values(orders).filter(o => o && o.nick === nick);
        if(userOrders.length === 0) return;

        let text = `🌿 33日本動物園 | 買家對帳明細\n👤 買家暱稱：${nick}\n--------------------\n`;
        let totalAll = 0;
        
        userOrders.forEach(o => {
            o.items.forEach(it => {
                const shipTxt = it.isShipped ? "[已出貨]" : "[未出貨]";
                text += `▪️ [${it.e}] ${it.n} (${it.sel}) ${shipTxt} - $${it.p}\n`;
                totalAll += it.p;
            });
        });
        text += `--------------------\n💰 總計金額：NT$ ${totalAll}\n✨ 感謝您的支持，歡迎隨時核對！`;

        navigator.clipboard.writeText(text).then(() => {
            alert(`📋 已複製 [${nick}] 的 LINE 專用對帳文字快訊！`);
        }).catch(() => {
            alert("複製失敗，請手動圈選文字。");
        });
    }

    function updateFilterButtons() {
        const nicks = [...new Set(Object.values(orders).filter(o => o).map(o => o.nick))];
        const container = document.getElementById('order-user-filters');
        let html = `<button class="filter-btn ${currentFilterUser==='all'?'active':''}" onclick="filterOrderUser('all')">全部 (${Object.keys(orders).length})</button>`;
        nicks.forEach(n => {
            const count = Object.values(orders).filter(o => o && o.nick === n).length;
            html += `<button class="filter-btn ${currentFilterUser===n?'active':''}" onclick="filterOrderUser('${n}')">${n} (${count})</button>`;
        });
        container.innerHTML = html;
    }

    function filterOrderUser(u) { currentFilterUser = u; renderAdminOrders(); updateFilterButtons(); }
    function filterMoneyStatus(s, btn) {
        currentMoneyFilter = s;
        document.querySelectorAll('#tab-money .filter-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        renderMoneyRecords();
    }

    // 前台買家自主查詢
    function runSearch() {
        const query = document.getElementById('search-nick').value.trim();
        const area = document.getElementById('search-results-area');
        if(!query) { area.innerHTML = ''; return; }

        let userOrders = Object.values(orders).filter(o => o && o.nick === query && o.isUnlocked);
        if(userOrders.length === 0) {
            area.innerHTML = `<p style="color:#999; font-size:13px; padding:10px 0;">查無已開放對帳的訂單，請確認暱稱是否正確或聯繫園長開放。</p>`;
            return;
        }

        let html = '';
        userOrders.forEach(o => {
            let itemStr = o.items.map(it => {
                const shipTxt = it.isShipped ? "🟢 已出貨" : "⚠️ 備貨中";
                return `<div style="font-size:12px; color:#555; padding:6px 0; border-bottom:1px dashed #EEE;">📌 [${it.e}] ${it.n} (${it.sel}) <span style="font-size:11px; margin-left:5px; padding:1px 4px; border-radius:3px; background:#FFF; border:1px solid #DDD;">${shipTxt}</span> <b style="float:right;">$ ${it.p}</b></div>`;
            }).join('');
            html += `<div style="background:#FFF; border:1px solid #EAE2D1; padding:12px; border-radius:8px; margin-bottom:10px;">
                <div style="font-size:12px; color:#888;">下單時間: ${new Date(o.time).toLocaleDateString()}</div>
                <div style="margin:8px 0; border-top:1px solid #EEE; padding-top:8px;">${itemStr}</div>
                <div style="text-align:right; font-weight:bold; color:var(--caramel);">
                    狀態: ${o.paid ? '<span style="color:green;">🟢 已收款</span>' : '<span style="color:red;">⚠️ 未收款</span>'} ｜ 總計: $ ${o.total}
                </div>
            </div>`;
        });
        area.innerHTML = html;
    }

    // 匯出 CSV (Excel 可開啟)
    function exportToCSV() {
        let csvContent = "\xEF\xBB\xBF買家,活動場次,商品周邊名稱,規格,台幣售價,出貨狀態,下單時間,付款狀態\n";
        Object.values(orders).forEach(o => {
            if(!o || !o.items) return;
            o.items.forEach(it => {
                let timeStr = new Date(o.time).toLocaleString().replace(/,/g, '');
                let paidStr = o.paid ? "已收款" : "未收款";
                let shipStr = it.isShipped ? "已出貨" : "未出貨";
                csvContent += `"${o.nick}","${it.e}","${it.n}","${it.sel}","${it.p}","${shipStr}","${timeStr}","${paidStr}"\n`;
            });
        });
        let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `33日本動物園_精密訂單統計_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 基礎核心函數
    function promptAdmin() {
        const pw = prompt("請輸入管理員（園長專用）登入密碼：");
        if(pw === "33zoo") {
            document.getElementById('front-hall').style.display = 'none';
        } else if(pw !== null) {
            alert("密碼錯誤！保護園長機密後台。");
        }
    }
    function exitAdmin() { document.getElementById('front-hall').style.display = 'flex'; }
    function closeModal() { 
        document.getElementById('edit-modal').style.display = 'none'; 
        document.getElementById('modal-save').innerText = "儲存變更"; 
    }
</script>
