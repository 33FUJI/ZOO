<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>33日本動物園 管理系統</title>
    <style>
        /* 基礎樣式重整 */
        body { font-family: 'Noto Sans TC', sans-serif; background: #fdfcf7; color: #333; margin: 0; }
        .admin-section { background: #ffffff; border: 1px solid #e6dec9; padding: 20px; border-radius: 8px; margin-bottom: 16px; }
        .quick-add-row { display: flex; gap: 8px; background: #fffbf2; padding: 12px; border: 1px dashed #d1c29d; border-radius: 6px; align-items: center; flex-wrap: wrap; }
        .quick-add-row input { flex: 1; min-width: 80px; padding: 6px 10px; border: 1px solid #dcd1b4; border-radius: 4px; }
        .quick-add-btn { background: #8e794b; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; }
        .editor-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .editor-table th, .editor-table td { padding: 10px; border-bottom: 1px solid #f0e9d7; text-align: left; }
    </style>
</head>
<body>

<div id="app-screen">
    <div id="pane-admin">
        <div class="admin-section">
            <h2>📝 系統活動場次維護</h2>
            <div id="active-events-list"></div>
        </div>
    </div>
</div>

<script>
/** * 核心功能：快速上架邏輯
 * 透過 Number() 強制轉型，解決 Console 中的解析錯誤
 */
function renderQuickAddRow(eventId, currentExchangeRate) {
    const rate = Number(currentExchangeRate) || 0.22;
    return `
    <div class="quick-add-row" id="quick-row-${eventId}">
        <span>⚡ 快捷商品：</span>
        <input type="text" id="qa-name-${eventId}" placeholder="名稱">
        <input type="number" id="qa-stock-${eventId}" value="1" min="1">
        <input type="number" id="qa-cost-${eventId}" placeholder="成本(¥)" oninput="autoCalculate('${eventId}', ${rate})">
        <input type="number" id="qa-price-${eventId}" placeholder="售價(NT)">
        <button class="quick-add-btn" onclick="executeQuickAdd('${eventId}')">新增</button>
    </div>`;
}

function autoCalculate(eventId, baseRate) {
    const cost = Number(document.getElementById(`qa-cost-${eventId}`).value) || 0;
    const priceInput = document.getElementById(`qa-price-${eventId}`);
    priceInput.value = Math.ceil(cost * baseRate);
}

function executeQuickAdd(eventId) {
    const data = {
        name: document.getElementById(`qa-name-${eventId}`).value,
        price: Number(document.getElementById(`qa-price-${eventId}`).value)
    };
    console.log('準備寫入 Firebase:', data);
    alert('商品已處理');
}
</script>
</body>
</html>
